<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schuylkill River Trail Map Sources</title>
    <meta name="google-maps-api-key" content="AIzaSyDiJ6649YziSbaV8mCt82d-DYwy0Eazm7c" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" />
    <style>
      :root {
        --bg: #f5f3ef;
        --panel: #ffffff;
        --ink: #202124;
        --muted: #636b70;
        --rule: #d9d4ca;
        --green: #397550;
        --blue: #276b9f;
        --red: #d52022;
        --orange: #f99400;
        --purple: #7656a6;
        --shadow: 0 12px 30px rgba(28, 31, 34, 0.16);
        --scrubber-height: 98px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: var(--bg);
      }

      #map {
        position: fixed;
        inset: 0;
      }

      .panel {
        position: fixed;
        z-index: 2;
        left: 16px;
        top: 16px;
        width: min(380px, calc(100vw - 32px));
        max-height: calc(100vh - var(--scrubber-height) - 32px);
        overflow: auto;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--rule);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .panel-header {
        position: sticky;
        top: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px;
        background: rgba(255, 255, 255, 0.97);
        border-bottom: 1px solid var(--rule);
      }

      .panel-body[hidden],
      .group-body[hidden] {
        display: none;
      }

      .panel-title {
        font-size: 13px;
        font-weight: 750;
        text-transform: uppercase;
        color: #3a3e41;
      }

      button {
        appearance: none;
        border: 1px solid var(--rule);
        background: #fff;
        color: var(--ink);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        line-height: 1;
        padding: 8px 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: #aeb7b2;
      }

      .collapse-button {
        display: grid;
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        place-items: center;
        padding: 0;
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .collapse-button:hover {
        border-color: var(--rule);
        color: var(--ink);
      }

      .collapse-button svg {
        width: 14px;
        height: 14px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.8;
        transition: transform 160ms ease;
      }

      .collapse-button[aria-expanded="false"] svg {
        transform: rotate(-90deg);
      }

      .basemap-control {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 11px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .basemap-control label {
        display: block;
        min-height: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .basemap-toggle {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }

      .basemap-option {
        display: grid;
        grid-template-rows: 20px auto;
        gap: 3px;
        min-height: 50px;
        place-items: center;
        padding: 5px 3px 4px;
        border-radius: 0;
        color: var(--muted);
      }

      .basemap-option + .basemap-option {
        margin-left: -1px;
      }

      .basemap-option:first-child {
        border-radius: 6px 0 0 6px;
      }

      .basemap-option:last-child {
        border-radius: 0 6px 6px 0;
      }

      .basemap-option[aria-pressed="true"] {
        z-index: 1;
        border-color: var(--green);
        background: #edf5f0;
        color: var(--green);
      }

      .basemap-option svg {
        width: 19px;
        height: 19px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.6;
      }

      .basemap-option-label {
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      .basemap-info {
        min-height: 14px;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.4;
      }

      .basemap-info a {
        color: inherit;
        text-decoration-color: #aeb7b2;
        text-underline-offset: 2px;
      }

      .basemap-info a:hover {
        color: var(--green);
      }

      select {
        width: 100%;
        min-height: 34px;
        border: 1px solid var(--rule);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        padding: 6px 9px;
      }

      .group {
        padding: 13px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .group:last-child {
        border-bottom: 0;
      }

      .group-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 9px;
      }

      .group-head-actions {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .group-head:has(.collapse-button[aria-expanded="false"]) {
        margin-bottom: 0;
      }

      .group-toggle {
        display: grid;
        grid-template-columns: 18px 1fr;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .group h2 {
        margin: 0;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
        letter-spacing: 0;
      }

      .count {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      label {
        display: grid;
        grid-template-columns: 18px 18px 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 31px;
        color: #282d30;
        font-size: 13px;
        line-height: 1.25;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--green);
      }

      .swatch {
        width: 16px;
        height: 5px;
        border-radius: 999px;
        background: var(--muted);
      }

      .swatch.point {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        justify-self: center;
      }

      .swatch.poly {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        opacity: 0.75;
      }

      .swatch.dashed {
        background:
          linear-gradient(90deg, currentColor 0 45%, transparent 45% 65%, currentColor 65% 100%);
        color: var(--red);
      }

      .folder-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
      }


      .group-body {
        display: grid;
        grid-template-columns: 1fr;
      }

      .folder-list label {
        grid-template-columns: 18px 14px 1fr auto;
        font-size: 12px;
      }

      .maplibregl-popup-content {
        max-width: min(340px, calc(100vw - 40px));
        padding: 13px 14px;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .popup-title {
        margin: 0 0 6px;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
      }

      .popup-meta {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-body {
        margin-top: 8px;
        color: #34383b;
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-address {
        margin: 8px 0 0;
        color: #34383b;
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-amenities {
        margin: 8px 0 0;
        padding-left: 18px;
        color: #34383b;
        font-size: 12px;
        line-height: 1.5;
      }

      .popup-link {
        display: inline-block;
        margin-top: 8px;
        color: var(--blue);
        font-size: 12px;
        text-decoration: none;
      }

      .popup-link:hover {
        text-decoration: underline;
      }

      .hover-metadata {
        position: fixed;
        z-index: 3;
        top: 10px;
        right: 50px;
        max-width: min(560px, calc(100vw - 70px));
        padding: 7px 9px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 4px;
        background: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
        pointer-events: none;
      }

      .hover-metadata[hidden] {
        display: none;
      }

      .trail-scrubber {
        position: fixed;
        z-index: 4;
        right: 0;
        bottom: 0;
        left: 0;
        min-height: var(--scrubber-height);
        display: grid;
        grid-template-columns: minmax(180px, 1fr);
        align-items: center;
        padding: 10px 20px 8px;
        background: #fff;
        border-top: 1px solid var(--rule);
      }

      .scrubber-control {
        min-width: 0;
      }

      .scrubber-track {
        min-width: 0;
      }

      .scrubber-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 26px;
        margin-top: -1px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.2;
      }

      .scrubber-footer strong {
        color: var(--ink);
        font-size: 12px;
      }

      .scrubber-play {
        display: grid;
        width: 22px;
        height: 22px;
        place-items: center;
        padding: 0;
        border-color: #bec6c1;
        border-radius: 50%;
        color: var(--green);
      }

      .scrubber-play:hover {
        border-color: var(--green);
      }

      .scrubber-play svg {
        width: 10px;
        height: 10px;
        fill: currentColor;
      }

      .scrubber-play [hidden] {
        display: none;
      }

      .trail-range {
        --progress: 0%;
        display: block;
        width: 100%;
        height: 26px;
        margin: 0;
        padding: 0;
        appearance: none;
        background: transparent;
        cursor: ew-resize;
      }

      .trail-range:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
        border-radius: 999px;
      }

      .trail-range::-webkit-slider-runnable-track {
        height: 5px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--green) 0 var(--progress), #d9dedb var(--progress) 100%);
      }

      .trail-range::-webkit-slider-thumb {
        width: 19px;
        height: 19px;
        margin-top: -7px;
        appearance: none;
        border: 3px solid #fff;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 1px rgba(32, 33, 36, 0.28), 0 2px 5px rgba(32, 33, 36, 0.22);
      }

      .trail-range::-moz-range-track {
        height: 5px;
        border-radius: 999px;
        background: #d9dedb;
      }

      .trail-range::-moz-range-progress {
        height: 5px;
        border-radius: 999px;
        background: var(--green);
      }

      .trail-range::-moz-range-thumb {
        width: 15px;
        height: 15px;
        border: 3px solid #fff;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 1px rgba(32, 33, 36, 0.28), 0 2px 5px rgba(32, 33, 36, 0.22);
      }

      .trail-range:disabled {
        cursor: wait;
        opacity: 0.5;
      }

      .scrubber-stops {
        position: relative;
        height: 17px;
        margin: 0 0 -1px;
        pointer-events: none;
      }

      .scrubber-stop {
        position: absolute;
        top: 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
        line-height: 1;
        white-space: nowrap;
        transform: translateX(-50%);
      }

      .scrubber-stop::before {
        position: absolute;
        top: 12px;
        left: 50%;
        width: 1px;
        height: 4px;
        background: #929b96;
        content: "";
      }

      .scrubber-stop.endpoint-start {
        transform: none;
      }

      .scrubber-stop.endpoint-start::before {
        left: 0;
      }

      .scrubber-stop.endpoint-end {
        transform: translateX(-100%);
      }

      .scrubber-stop.endpoint-end::before {
        left: 100%;
      }

      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-bottom-right {
        bottom: var(--scrubber-height);
      }

      @media (max-width: 1000px) {
        .scrubber-stop[data-name="Manayunk"],
        .scrubber-stop[data-name="Phoenixville"],
        .scrubber-stop[data-name="Pottsville"] {
          display: none;
        }
      }

      @media (max-width: 760px) {
        :root {
          --scrubber-height: 96px;
        }

        .panel {
          left: 10px;
          right: 10px;
          top: 10px;
          width: auto;
          max-height: calc(100vh - var(--scrubber-height) - 20px);
        }

        .trail-scrubber {
          grid-template-columns: minmax(120px, 1fr);
          padding: 9px 10px 7px;
        }

        .scrubber-stop {
          font-size: 8px;
        }

      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="hover-metadata" id="hover-metadata" hidden></div>

    <aside class="panel" aria-label="Layer controls">
      <div class="panel-header">
        <div class="panel-title">SRT Data Explorer</div>
        <button class="collapse-button" type="button" data-collapse-target="panel-body" aria-expanded="false" aria-controls="panel-body" aria-label="Expand SRT Data Explorer" title="Expand panel">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
        </button>
      </div>

      <div class="panel-body" id="panel-body" hidden>

      <section class="basemap-control">
        <label id="basemap-style-label">Map Style</label>
        <div class="basemap-toggle" role="group" aria-labelledby="basemap-style-label">
          <button class="basemap-option" type="button" data-basemap-style="light" aria-label="Light grayscale OpenStreetMap style" aria-pressed="true" title="Light OSM">
            <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="3.2" /><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.3 4.3l1.4 1.4M14.3 14.3l1.4 1.4M15.7 4.3l-1.4 1.4M5.7 14.3l-1.4 1.4" /></svg>
            <span class="basemap-option-label">Light</span>
          </button>
          <button class="basemap-option" type="button" data-basemap-style="osm" aria-label="OpenStreetMap Standard style" aria-pressed="false" title="OpenStreetMap Standard">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m2.5 5 5-2.5 5 2.5 5-2.5v12.5l-5 2.5-5-2.5-5 2.5Z" /><path d="M7.5 2.5V15m5-10v12.5" /></svg>
            <span class="basemap-option-label">OSM</span>
          </button>
          <button class="basemap-option" type="button" data-basemap-style="cycle" aria-label="CyclOSM cycling style" aria-pressed="false" title="CyclOSM">
            <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="5" cy="14" r="3" /><circle cx="15" cy="14" r="3" /><path d="m5 14 3-6h3l4 6m-7-6 4 6H5m2-8h3" /></svg>
            <span class="basemap-option-label">Cycling</span>
          </button>
          <button class="basemap-option" type="button" data-basemap-style="google" aria-label="Google roadmap style" aria-pressed="false" title="Google Maps">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M16.2 10.2c0-.7-.1-1.3-.2-1.9H10v3.5h3.4a3 3 0 0 1-1.3 1.9V16h3c1.7-1.6 2.7-3.9 2.7-5.8Z" /><path d="M10 18c2.4 0 4.4-.8 5.9-2.1l-2.9-2.2c-.8.5-1.8.9-3 .9-2.3 0-4.3-1.6-5-3.7H2v2.3A8.9 8.9 0 0 0 10 18Z" /><path d="M5 10.9a5.4 5.4 0 0 1 0-3.5V5.1H2a9 9 0 0 0 0 8.1Z" /><path d="M10 3.5c1.3 0 2.5.5 3.4 1.3L16 2.3A8.7 8.7 0 0 0 2 5.1l3 2.3c.7-2.2 2.7-3.9 5-3.9Z" /></svg>
            <span class="basemap-option-label">Google</span>
          </button>
        </div>
        <div class="basemap-info">Tileset info: <a id="basemap-info-link" href="https://openfreemap.org/" target="_blank" rel="noopener noreferrer">openfreemap.org</a></div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="srg" checked />
            <h2>SRG Website Data</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="srg-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="srg-layer-list" aria-expanded="true" aria-controls="srg-layer-list" aria-label="Collapse SRG Website Data layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="srg-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="srg-active-off-road" checked />
          <span class="swatch" style="background: #d52022"></span>
          <span>Active off-road SRT</span>
          <span class="count" id="count-srg-active-off-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-active-on-road" checked />
          <span class="swatch" style="background: #f99400"></span>
          <span>Active on-road SRT</span>
          <span class="count" id="count-srg-active-on-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-proposed-off-road" checked />
          <span class="swatch dashed"></span>
          <span>Proposed off-road SRT</span>
          <span class="count" id="count-srg-proposed-off-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-proposed-on-road" checked />
          <span class="swatch dashed" style="color: #f99400"></span>
          <span>Proposed on-road SRT</span>
          <span class="count" id="count-srg-proposed-on-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-trailheads" checked />
          <span class="swatch point" style="background: #074a67"></span>
          <span>Trailheads</span>
          <span class="count" id="count-srg-trailheads"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-towns" />
          <span class="swatch point" style="background: #6db220"></span>
          <span>Trail towns</span>
          <span class="count" id="count-srg-towns"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-places" />
          <span class="swatch point" style="background: #8d5b2d"></span>
          <span>Places to visit</span>
          <span class="count" id="count-srg-places"></span>
        </label>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="osm" checked />
            <h2>OpenStreetMap SRT Data</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="osm-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="osm-layer-list" aria-expanded="true" aria-controls="osm-layer-list" aria-label="Collapse OpenStreetMap SRT Data layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="osm-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="osm-srt" checked />
          <span class="swatch" style="background: #276b9f"></span>
          <span>OSM physical ways</span>
          <span class="count" id="count-osm-srt"></span>
        </label>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="google" />
            <h2>[WIP] Google Maps Search Results</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="google-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="google-layer-list" aria-expanded="true" aria-controls="google-layer-list" aria-label="Collapse [WIP] Google Maps Search Results layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="google-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="google-places" />
          <span class="swatch point" style="background: #4285f4"></span>
          <span>Places results</span>
          <span class="count" id="count-google-places"></span>
        </label>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="improvements-2026" checked />
            <h2>2026 Improvements Map</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="improvements-2026-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="improvements-2026-layer-list" aria-expanded="true" aria-controls="improvements-2026-layer-list" aria-label="Collapse 2026 Improvements Map layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>

    <script>
      const ATTRIBUTION = {
        osm:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        cyclosm:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors · map style &copy; <a href="https://www.cyclosm.org/">CyclOSM</a>',
        google: '<a href="https://maps.google.com/">Google Maps</a>',
      };

      function rasterStyle({ background, sources }) {
        const styleSources = {};
        const layers = [{ id: "basemap-background", type: "background", paint: { "background-color": background } }];
        for (const source of sources) {
          styleSources[source.id] = {
            type: "raster",
            tiles: source.tiles,
            tileSize: source.tileSize || 256,
            maxzoom: source.maxzoom || 19,
            attribution: source.attribution,
          };
          layers.push({
            id: `${source.id}-layer`,
            type: "raster",
            source: source.id,
            paint: { "raster-opacity": source.opacity ?? 1 },
          });
        }
        return { version: 8, sources: styleSources, layers };
      }

      async function googleRoadmapStyle() {
        const apiKey = document.querySelector('meta[name="google-maps-api-key"]')?.content.trim();
        if (!apiKey) throw new Error("The Google Maps browser key is not configured.");
        const response = await fetch(
          `https://tile.googleapis.com/v1/createSession?key=${encodeURIComponent(apiKey)}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mapType: "roadmap", language: "en-US", region: "US" }),
          },
        );
        if (!response.ok) {
          let message = `Google Map Tiles session failed (${response.status}).`;
          try {
            const error = await response.json();
            if (error.error?.message) message += ` ${error.error.message}`;
          } catch {
            // Keep the status-only error when Google does not return JSON.
          }
          throw new Error(message);
        }
        const session = await response.json();
        if (!session.session) throw new Error("Google Map Tiles API returned no session token.");
        const tileUrl = `https://tile.googleapis.com/v1/2dtiles/{z}/{x}/{y}?session=${encodeURIComponent(session.session)}&key=${encodeURIComponent(apiKey)}`;
        return rasterStyle({
          background: "#e8eaed",
          sources: [
            {
              id: "google-roadmap",
              tiles: [tileUrl],
              tileSize: Number(session.tileWidth) || 256,
              maxzoom: 22,
              attribution: ATTRIBUTION.google,
            },
          ],
        });
      }

      const map = new maplibregl.Map({

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function htmlToText(value) {
        if (!value) return "";
        const doc = new DOMParser().parseFromString(value, "text/html");
        return (doc.body.textContent || "").replace(/\s+/g, " ").trim();
      }

      function parseInfoWindow(value) {
        if (!value) return null;

        const doc = new DOMParser().parseFromString(value, "text/html");
        const addressNode = doc.querySelector(".address");
        const addressWithoutLink = addressNode?.cloneNode(true);
        addressWithoutLink?.querySelectorAll("a").forEach((link) => link.remove());

        return {
          address: (addressWithoutLink?.textContent || "")
            .replace(/\s+/g, " ")
            .replace(/\s*•\s*$/, "")
            .trim(),
          description: (doc.querySelector("p")?.textContent || "").replace(/\s+/g, " ").trim(),
          directionsUrl: addressNode?.querySelector("a.directions")?.href || "",
          amenities: [...doc.querySelectorAll(".amenity-icons li span")]
            .map((item) => (item.textContent || "").replace(/\s+/g, " ").trim())
            .filter(Boolean),
        };
      }

      function wrapCanvasText(context, value, maxWidth) {
        const words = value.split(/\s+/).filter(Boolean);
        const lines = [];
        let line = "";
        for (const word of words) {
          const candidate = line ? `${line} ${word}` : word;
          if (line && context.measureText(candidate).width > maxWidth) {
            lines.push(line);
            line = word;
          } else {
            line = candidate;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      function drawAmenityGlyph(context, amenity, x, y, size) {
        const key = amenity.toLowerCase();
        const centerX = x + size / 2;
        const centerY = y + size / 2;
        const left = x + 4;
        const right = x + size - 4;
        const top = y + 4;
        const bottom = y + size - 4;
        context.save();
        context.fillStyle = "#fff";
        context.strokeStyle = "#fff";
        context.lineWidth = 1.45;
        context.lineCap = "round";
        context.lineJoin = "round";

        if (key === "parking") {
          context.font = `800 ${size - 5}px Arial, sans-serif`;
          context.textAlign = "center";
          context.textBaseline = "middle";
          context.fillText("P", centerX, centerY + 0.5);
        } else if (key === "visitor center") {
          context.beginPath();
          context.arc(centerX, centerY, size / 2 - 4, 0, Math.PI * 2);
          context.stroke();
          context.font = `800 ${size - 8}px Georgia, serif`;
          context.textAlign = "center";
          context.textBaseline = "middle";
          context.fillText("i", centerX, centerY + 0.5);
        } else if (key === "restaurant") {
          context.beginPath();
          context.moveTo(left + 2, top); context.lineTo(left + 2, bottom);
          context.moveTo(left, top); context.lineTo(left, top + 4); context.lineTo(left + 4, top + 4); context.lineTo(left + 4, top);
          context.moveTo(right, top); context.quadraticCurveTo(right - 5, top + 5, right, top + 8); context.lineTo(right, bottom);
          context.stroke();
        } else if (key === "restrooms") {
          for (const offset of [-3.5, 3.5]) {
            context.beginPath();
            context.arc(centerX + offset, top + 1.5, 1.5, 0, Math.PI * 2);
            context.fill();
            context.fillRect(centerX + offset - 1.2, top + 4, 2.4, 5);
            context.beginPath();
            context.moveTo(centerX + offset, top + 8); context.lineTo(centerX + offset - 1.8, bottom);
            context.moveTo(centerX + offset, top + 8); context.lineTo(centerX + offset + 1.8, bottom);
            context.stroke();
          }
        } else if (key.includes("bike") || key === "mountain bikes") {
          context.beginPath();
          context.arc(left + 2, bottom - 1, 3, 0, Math.PI * 2);
          context.arc(right - 2, bottom - 1, 3, 0, Math.PI * 2);
          context.moveTo(left + 2, bottom - 1); context.lineTo(centerX - 1, top + 4); context.lineTo(right - 2, bottom - 1);
          context.moveTo(centerX - 1, top + 4); context.lineTo(centerX + 3, bottom - 1); context.lineTo(left + 2, bottom - 1);
          context.moveTo(centerX - 3, top + 3); context.lineTo(centerX + 1, top + 3);
          context.stroke();
          if (key.includes("repair")) {
            context.beginPath(); context.moveTo(right - 3, top); context.lineTo(left + 3, bottom); context.stroke();
          }
        } else if (key === "gasoline") {
          context.strokeRect(left + 1, top, 6, bottom - top);
          context.strokeRect(left + 2.5, top + 2, 3, 3);
          context.beginPath(); context.moveTo(left + 7, top + 3); context.quadraticCurveTo(right, top + 4, right - 1, centerY + 2); context.lineTo(right - 1, bottom); context.stroke();
        } else if (key === "convenience store") {
          context.beginPath(); context.moveTo(left, top + 2); context.lineTo(left + 2, bottom - 2); context.lineTo(right - 1, bottom - 2); context.lineTo(right, top + 5); context.lineTo(left + 1, top + 5); context.stroke();
          context.beginPath(); context.arc(left + 4, bottom, 1, 0, Math.PI * 2); context.arc(right - 3, bottom, 1, 0, Math.PI * 2); context.fill();
        } else if (key === "picnic area") {
          context.beginPath(); context.moveTo(left, centerY); context.lineTo(right, centerY); context.moveTo(left + 2, centerY - 3); context.lineTo(right - 2, centerY - 3); context.moveTo(centerX - 3, centerY); context.lineTo(centerX - 5, bottom); context.moveTo(centerX + 3, centerY); context.lineTo(centerX + 5, bottom); context.stroke();
        } else if (key === "septa station") {
          context.strokeRect(left + 1, top, right - left - 2, bottom - top - 2);
          context.beginPath(); context.moveTo(left + 3, top + 3); context.lineTo(right - 3, top + 3); context.moveTo(centerX, top + 1); context.lineTo(centerX, top + 5); context.moveTo(left + 3, bottom); context.lineTo(left + 1, bottom + 2); context.moveTo(right - 3, bottom); context.lineTo(right - 1, bottom + 2); context.stroke();
        } else if (key === "point-of-interest") {
          context.font = `800 ${size - 7}px Arial, sans-serif`;
          context.textAlign = "center";
          context.textBaseline = "middle";
          context.fillText("★", centerX, centerY + 0.5);
        } else if (key.includes("launch") || key.includes("landing") || key === "boat ramp" || key === "watercraft") {
          context.beginPath(); context.moveTo(left, centerY); context.lineTo(right, centerY); context.lineTo(right - 3, centerY + 4); context.lineTo(left + 3, centerY + 4); context.closePath(); context.stroke();
          context.beginPath(); context.moveTo(left, bottom - 1); context.quadraticCurveTo(left + 3, bottom - 3, centerX, bottom - 1); context.quadraticCurveTo(right - 3, bottom + 1, right, bottom - 1); context.stroke();
          if (key.includes("canoe")) {
            context.beginPath(); context.moveTo(left + 1, top); context.lineTo(right - 1, bottom); context.stroke();
          }
        } else {
          context.font = `800 ${size - 8}px Arial, sans-serif`;
          context.textAlign = "center";
          context.textBaseline = "middle";
          context.fillText(amenity.slice(0, 2).toUpperCase(), centerX, centerY);
        }
        context.restore();
      }

      function trailheadLabelImage(name, amenities) {
        const scale = 2;
        const padding = 9;
        const iconSize = 20;
        const iconGap = 4;
        const pointerHeight = 8;
        const maxTextWidth = 190;
        const label = /trailhead/i.test(name) ? name : `${name} Trailhead`;
        const measureCanvas = document.createElement("canvas");
        const measureContext = measureCanvas.getContext("2d");
        measureContext.font = "700 14px Arial, sans-serif";
        const titleLines = wrapCanvasText(measureContext, label, maxTextWidth);
        const titleWidth = Math.max(...titleLines.map((line) => measureContext.measureText(line).width));
        const iconRowWidth = amenities.length ? amenities.length * iconSize + (amenities.length - 1) * iconGap : 0;
        const width = Math.ceil(Math.max(112, titleWidth + padding * 2, iconRowWidth + padding * 2));
        const titleHeight = titleLines.length * 16;
        const cardHeight = padding + titleHeight + (amenities.length ? 7 + iconSize : 0) + padding;
        const height = cardHeight + pointerHeight;
        const canvas = document.createElement("canvas");
        canvas.width = width * scale;
        canvas.height = height * scale;
        const context = canvas.getContext("2d");
        context.scale(scale, scale);
        context.fillStyle = "rgba(255,255,255,0.97)";
        context.strokeStyle = "#213a70";
        context.lineWidth = 1.5;
        context.beginPath();
        context.rect(0.75, 0.75, width - 1.5, cardHeight - 1.5);
        context.moveTo(width / 2 - 7, cardHeight - 0.75);
        context.lineTo(width / 2, height - 1);
        context.lineTo(width / 2 + 7, cardHeight - 0.75);
        context.fill();
        context.stroke();
        context.fillStyle = "#213a70";
        context.font = "700 14px Arial, sans-serif";
        context.textAlign = "left";
        context.textBaseline = "top";
        titleLines.forEach((line, index) => context.fillText(line, padding, padding + index * 16));
        if (amenities.length) {
          let iconX = (width - iconRowWidth) / 2;
          const iconY = padding + titleHeight + 7;
          for (const amenity of amenities) {
            context.fillStyle = "#213a70";
            context.fillRect(iconX, iconY, iconSize, iconSize);
            drawAmenityGlyph(context, amenity, iconX, iconY, iconSize);
            iconX += iconSize + iconGap;
          }
        }
        return context.getImageData(0, 0, canvas.width, canvas.height);
      }

      function registerTrailheadLabelImages(srg) {
        srg.features.forEach((feature, index) => {
          if (feature.properties?.layer !== "trailhead" || feature.geometry?.type !== "Point") return;
          const imageId = `trailhead-label-${feature.properties.source_post_id || index}`;
          feature.properties.trailhead_label_image = imageId;
          if (map.hasImage(imageId)) return;
          const amenities = parseInfoWindow(feature.properties.infowindow_html)?.amenities || [];
          map.addImage(imageId, trailheadLabelImage(feature.properties.name || "Trailhead", amenities), { pixelRatio: 2 });
        });
      }

      function sourcePageUrl(feature) {
        const props = feature.properties || {};
        if (props.google_maps_uri) return props.google_maps_uri;
        if (props.source_page_url) return props.source_page_url;
        if (props.osm_url) return props.osm_url;
        if (props.source_urlpath) return new URL(props.source_urlpath, "https://schuylkillriver.org").href;
        if (props.source_url) return props.source_url;
        return "";
      }

      function sourceLabel(feature) {
        const props = feature.properties || {};
        const source = feature.source || "";
        if (source === "improvements") return "2025 improvements";
        if (source === "improvements-2026") return "2026 improvements";
        if (source === "google-places" || props.google_place_id) return "[WIP] Google Maps Search Results";
        if (source === "osm-srt" || props.osm_id) return "OSM";
        if (source === "srg") return props.layer ? `SRG ${props.layer}` : "SRG";
        return props.layer || "Map feature";
      }

      function featureMetadata(feature) {
        const props = feature.properties || {};
        const bits = [];

        if (props.status || props.alignment) bits.push([props.status, props.alignment].filter(Boolean).join(" / "));
        if (props.folder) bits.push(props.folder);
        if (props.surface) bits.push(`surface: ${props.surface}`);
        if (props.highway) bits.push(`highway: ${props.highway}`);
        if (props.primary_type) bits.push(props.primary_type.replaceAll("_", " "));
        if (props.source_post_id) bits.push(`SRG post ${props.source_post_id}`);
        if (props.osm_id) bits.push(`OSM ${props.osm_type || "way"} ${props.osm_id}`);

        return [sourceLabel(feature), ...bits].filter(Boolean).join(" · ");
      }

      function popupHtml(feature) {
        const props = feature.properties || {};
        const title =
          props.display_name ||
          props.name ||
          props.placemark_name ||
          props.osm_name ||
          props.segment_name ||
          props.folder ||
          "Map feature";

        const infoWindow = parseInfoWindow(props.infowindow_html);
        const body = (
          infoWindow?.description ||
          htmlToText(props.description_html || props.description || props.formatted_address)
        ).slice(0, 560);
        const url = sourcePageUrl(feature);
        const amenities = infoWindow?.amenities || [];

        return `
          <h3 class="popup-title">${escapeHtml(title)}</h3>
          <p class="popup-meta">${escapeHtml(featureMetadata(feature))}</p>
          ${infoWindow?.address ? `<p class="popup-address">${escapeHtml(infoWindow.address)}</p>` : ""}
          ${body ? `<div class="popup-body">${escapeHtml(body)}</div>` : ""}
          ${amenities.length ? `<ul class="popup-amenities">${amenities.map((amenity) => `<li>${escapeHtml(amenity)}</li>`).join("")}</ul>` : ""}
          ${infoWindow?.directionsUrl ? `<a class="popup-link" href="${escapeHtml(infoWindow.directionsUrl)}" target="_blank" rel="noreferrer">Get directions</a>` : ""}
          ${url ? `<a class="popup-link" href="${escapeHtml(url)}" target="_blank" rel="noreferrer">Open source</a>` : ""}
        `;
      }

      async function loadGeojson(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${url}: ${response.status}`);
        return response.json();
      }

      function withoutExcludedSrgFeatures(geojson) {
        return {
          ...geojson,
          features: geojson.features.filter((feature) => !excludedSrgPostIds.has(feature.properties?.source_post_id)),
        };
      }

      function countFeatures(geojson, predicate) {
        return geojson.features.filter(predicate).length;
      }

      function setCount(id, value) {
        document.getElementById(id).textContent = value.toLocaleString();
      }

      function featureFolder(feature) {
        return feature.properties?.folder || "Unsorted";
      }

      function folderColor(folder, folderIndex) {
        return folderColors[folderIndex[folder] % folderColors.length];
      }

      function buildMatchExpression(folderIndex) {
        const expression = ["match", ["coalesce", ["get", "folder"], "Unsorted"]];
        for (const folder of Object.keys(folderIndex)) {
          expression.push(folder, folderColor(folder, folderIndex));
        }
        expression.push("#c9503c");
        return expression;
      }

      function zoomRadius(base) {
        return ["interpolate", ["linear"], ["zoom"], 10, base, 13, base * 1.25];
      }

      function distanceMiles(first, second) {
        const toRadians = Math.PI / 180;
        const firstLat = first[1] * toRadians;
        const secondLat = second[1] * toRadians;
        const deltaLat = (second[1] - first[1]) * toRadians;
        const deltaLng = (second[0] - first[0]) * toRadians;
        const haversine =
          Math.sin(deltaLat / 2) ** 2 +
          Math.cos(firstLat) * Math.cos(secondLat) * Math.sin(deltaLng / 2) ** 2;
        return 3958.8 * 2 * Math.asin(Math.min(1, Math.sqrt(haversine)));
      }

      function prepareScrubRoute(geojson) {
        const coordinates = [...(geojson.features?.[0]?.geometry?.coordinates || [])];
        if (coordinates.length < 2) return null;
        const cumulative = [0];
        for (let index = 1; index < coordinates.length; index += 1) {
          cumulative.push(cumulative[index - 1] + distanceMiles(coordinates[index - 1], coordinates[index]));
        }
        return {
          coordinates,
          cumulative,
          totalMiles: cumulative[cumulative.length - 1],
        };
      }

      function routeFractionForCoordinate(point) {
        if (!scrubRoute) return 0;
        let closestGap = Infinity;
        let closestMiles = 0;
        for (let index = 1; index < scrubRoute.coordinates.length; index += 1) {
          const first = scrubRoute.coordinates[index - 1];
          const second = scrubRoute.coordinates[index];
          const latitudeScale = Math.cos(((first[1] + second[1]) / 2) * Math.PI / 180);
          const segmentX = (second[0] - first[0]) * latitudeScale;
          const segmentY = second[1] - first[1];
          const pointX = (point[0] - first[0]) * latitudeScale;
          const pointY = point[1] - first[1];
          const segmentLengthSquared = segmentX ** 2 + segmentY ** 2;
          const amount = segmentLengthSquared
            ? Math.max(0, Math.min(1, (pointX * segmentX + pointY * segmentY) / segmentLengthSquared))
            : 0;
          const projected = [
            first[0] + (second[0] - first[0]) * amount,
            first[1] + (second[1] - first[1]) * amount,
          ];
          const gap = distanceMiles(point, projected);
          if (gap < closestGap) {
            closestGap = gap;
            const segmentMiles = scrubRoute.cumulative[index] - scrubRoute.cumulative[index - 1];
            closestMiles = scrubRoute.cumulative[index - 1] + segmentMiles * amount;
          }
        }
        return closestMiles / scrubRoute.totalMiles;
      }

      function buildScrubberStops(srg) {
        scrubberStops.innerHTML = "";
        const stops = [
          { name: "Philadelphia", fraction: 0, endpoint: "start" },
          { name: "Frackville", fraction: 1, endpoint: "end" },
        ];
        for (const name of ["Manayunk", "Phoenixville", "Pottstown", "Reading", "Hamburg", "Pottsville"]) {
          const town = srg.features.find(
            (feature) => feature.properties?.layer === "town" && feature.properties?.name === name,
          );
          if (!town || town.geometry?.type !== "Point") continue;
          const fraction = routeFractionForCoordinate(town.geometry.coordinates);
          stops.push({ name, fraction });
        }
        stops.sort((first, second) => first.fraction - second.fraction);
        for (const { name, fraction, endpoint } of stops) {
          const label = document.createElement("span");
          label.className = `scrubber-stop${endpoint ? ` endpoint-${endpoint}` : ""}`;
          label.dataset.name = name;
          label.style.left = `${(fraction * 100).toFixed(2)}%`;
          label.textContent = name;
          label.title = `${name} · ${(fraction * scrubRoute.totalMiles).toFixed(1)} mi`;
          scrubberStops.appendChild(label);
        }
      }

      function scrubPosition(fraction) {
        if (!scrubRoute) return null;
        const target = Math.max(0, Math.min(1, fraction)) * scrubRoute.totalMiles;
        let low = 0;
        let high = scrubRoute.cumulative.length - 1;
        while (low < high) {
          const middle = Math.floor((low + high) / 2);
          if (scrubRoute.cumulative[middle] < target) low = middle + 1;
          else high = middle;
        }

        const after = Math.max(1, low);
        const before = after - 1;
        const span = scrubRoute.cumulative[after] - scrubRoute.cumulative[before];
        const amount = span ? (target - scrubRoute.cumulative[before]) / span : 0;
        const first = scrubRoute.coordinates[before];
        const second = scrubRoute.coordinates[after];
        const coordinate = [
          first[0] + (second[0] - first[0]) * amount,
          first[1] + (second[1] - first[1]) * amount,
        ];
        return { coordinate, miles: target };
      }

      function milesFromLocationHash() {
        let value;
        try {
          value = decodeURIComponent(window.location.hash.slice(1)).trim();
        } catch {
          return null;
        }
        const match = value.match(/^marker-((?:\d+(?:\.\d*)?|\.\d+))$/);
        if (!match) return null;
        const miles = Number(match[1]);
        if (!Number.isFinite(miles) || miles < 0 || miles > scrubRoute.totalMiles) return null;
        return miles;
      }

      function setScrubberMiles(miles, moveCamera = true) {
        const fraction = miles / scrubRoute.totalMiles;
        trailRange.value = String(fraction * Number(trailRange.max));
        scrubPlaybackValue = Number(trailRange.value);
        updateTrailScrubber(fraction, moveCamera);
      }

      function updateLocationHash(fraction) {
        const miles = Math.max(0, Math.min(1, fraction)) * scrubRoute.totalMiles;
        const hash = `#marker-${miles.toFixed(1)}`;
        if (window.location.hash !== hash) history.replaceState(null, "", hash);
      }

      function updateTrailScrubber(fraction, moveCamera = true, setCameraZoom = true) {
        const position = scrubPosition(fraction);
        if (!position) return;
        const percent = Math.round(fraction * 100);
        trailRange.style.setProperty("--progress", `${percent}%`);
        scrubberDistance.textContent = `${position.miles.toFixed(1)} / ${scrubRoute.totalMiles.toFixed(1)} mi`;
        trailRange.setAttribute(
          "aria-valuetext",
          `${position.miles.toFixed(1)} miles from the trail source`,
        );

        const source = map.getSource("trail-scrub-position");
        if (source) {
          source.setData({
            type: "Feature",
            properties: {},
            geometry: { type: "Point", coordinates: position.coordinate },
          });
        }
        if (moveCamera) {
          if (activePopup) activePopup.remove();
          activePopup = null;
          map.jumpTo({
            center: position.coordinate,
            zoom: setCameraZoom ? 13.25 : map.getZoom(),
            bearing: 0,
            pitch: 0,
          });
        }
      }

      function setScrubPlaybackUi(playing) {
        scrubPlaying = playing;
        scrubberPlayIcon.toggleAttribute("hidden", playing);
        scrubberPauseIcon.toggleAttribute("hidden", !playing);
        scrubberPlay.setAttribute("aria-label", playing ? "Pause trail" : "Play trail");
        scrubberPlay.title = playing ? "Pause trail" : "Play trail";
      }

      function pauseTrailPlayback() {
        if (scrubPlaybackFrame) cancelAnimationFrame(scrubPlaybackFrame);
        scrubPlaybackFrame = null;
        scrubPlaybackTimestamp = null;
        setScrubPlaybackUi(false);
      }

      function animateTrailPlayback(timestamp) {
        if (!scrubPlaying) return;
        if (scrubPlaybackTimestamp === null) scrubPlaybackTimestamp = timestamp;
        const elapsed = timestamp - scrubPlaybackTimestamp;
        scrubPlaybackTimestamp = timestamp;
        const max = Number(trailRange.max);
        scrubPlaybackValue = Math.min(max, scrubPlaybackValue + elapsed * max / SCRUB_PLAYBACK_DURATION);
        trailRange.value = String(scrubPlaybackValue);
        const fraction = scrubPlaybackValue / max;
        updateLocationHash(fraction);
        updateTrailScrubber(fraction, true, false);
        if (scrubPlaybackValue >= max) {
          pauseTrailPlayback();
          return;
        }
        scrubPlaybackFrame = requestAnimationFrame(animateTrailPlayback);
      }

      function playTrailPlayback() {
        if (scrubPlaying || !scrubRoute) return;
        const max = Number(trailRange.max);
        if (Number(trailRange.value) >= max) {
          scrubPlaybackValue = 0;
          trailRange.value = "0";
        } else {
          scrubPlaybackValue = Number(trailRange.value);
        }
        const setCameraZoom = !scrubPlaybackHasStarted;
        scrubPlaybackHasStarted = true;
        updateTrailScrubber(scrubPlaybackValue / max, true, setCameraZoom);
        scrubPlaybackTimestamp = null;
        setScrubPlaybackUi(true);
        scrubPlaybackFrame = requestAnimationFrame(animateTrailPlayback);
      }

      function toggleTrailPlayback() {
        if (scrubPlaying) pauseTrailPlayback();
        else playTrailPlayback();
      }

      function wireTrailScrubber(srg) {
        if (!scrubRoute) {
          scrubberDistance.textContent = "Route unavailable";
          return;
        }
        buildScrubberStops(srg);
        trailRange.disabled = false;
        scrubberPlay.disabled = false;
        setScrubPlaybackUi(false);
        const hashMiles = milesFromLocationHash();
        if (hashMiles === null) updateTrailScrubber(Number(trailRange.value) / Number(trailRange.max), false);
        else setScrubberMiles(hashMiles);
        scrubberPlay.addEventListener("click", toggleTrailPlayback);
        trailRange.addEventListener("input", () => {
          pauseTrailPlayback();
          scrubPlaybackValue = Number(trailRange.value);
          updateLocationHash(scrubPlaybackValue / Number(trailRange.max));
          if (scrubFrame) cancelAnimationFrame(scrubFrame);
          scrubFrame = requestAnimationFrame(() => {
            updateTrailScrubber(Number(trailRange.value) / Number(trailRange.max));
            scrubFrame = null;
          });
        });
        document.addEventListener("pointerdown", (event) => {
          if (event.target instanceof Element && event.target.closest("#scrubber-play")) return;
          pauseTrailPlayback();
        });
        document.addEventListener("wheel", pauseTrailPlayback, { passive: true });
        document.addEventListener("keydown", (event) => {
          if (event.target instanceof Element && event.target.closest("#scrubber-play")) return;
          pauseTrailPlayback();
        });
        window.addEventListener("hashchange", () => {
          const miles = milesFromLocationHash();
          if (miles === null) return;
          pauseTrailPlayback();
          setScrubberMiles(miles);
        });
        window.addEventListener("blur", pauseTrailPlayback);
      }

      function buildFolderControls(containerId, dataName, folders, folderIndex, improvements) {
        const folderList = document.getElementById(containerId);
        folderList.innerHTML = "";

        for (const folder of folders) {
          const id = `${dataName}-${folder.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}`;
          const count = countFeatures(improvements, (feature) => featureFolder(feature) === folder);
          const checkedByDefault = dataName !== "folder2025" && folder !== "Trail Alignment";
          const label = document.createElement("label");
          label.innerHTML = `
            <input id="${id}" type="checkbox" data-${dataName}="${escapeHtml(folder)}"${checkedByDefault ? " checked" : ""} />
            <span class="swatch point" style="background: ${folderColor(folder, folderIndex)}"></span>
            <span>${escapeHtml(folder)}</span>
            <span class="count">${count.toLocaleString()}</span>
          `;
          folderList.appendChild(label);
        }

        folderList.addEventListener("change", () => {
          updateImprovementFolderFilters();
          updateAllLayerGroupToggles();
        });
      }

      function updateImprovementFolderFilter(dataName, layerIds) {
        const checked = [...document.querySelectorAll(`[data-${dataName}]:checked`)].map((input) => input.dataset[dataName]);
        const folderFilter = checked.length
          ? ["in", ["coalesce", ["get", "folder"], "Unsorted"], ["literal", checked]]
          : ["==", ["get", "__never__"], "__none__"];

        for (const layerId of layerIds) {
          if (!map.getLayer(layerId)) continue;
          const geom =
            layerId.includes("lines")
              ? "LineString"
              : layerId.includes("points")
                ? "Point"
                : "Polygon";
          map.setFilter(layerId, ["all", ["==", ["geometry-type"], geom], folderFilter]);
        }
      }

      function updateImprovementFolderFilters() {
        updateImprovementFolderFilter("folder2025", ["improvements-lines", "improvements-polygons-fill", "improvements-polygons-outline", "improvements-points"]);
        updateImprovementFolderFilter("folder2026", ["improvements-2026-lines", "improvements-2026-polygons-fill", "improvements-2026-polygons-outline", "improvements-2026-points"]);
      }

      function addPopups() {
        map.on("mousemove", (event) => {
          const activeLayers = clickableLayers.filter((layerId) => map.getLayer(layerId));
          const features = activeLayers.length
            ? map.queryRenderedFeatures(event.point, { layers: activeLayers })
            : [];
          map.getCanvas().style.cursor = features.length ? "pointer" : "";
          hoverMetadata.hidden = features.length === 0;
          hoverMetadata.textContent = features.length ? featureMetadata(features[0]) : "";
        });

        map.getCanvasContainer().addEventListener("mouseleave", () => {
          map.getCanvas().style.cursor = "";
          hoverMetadata.hidden = true;
          hoverMetadata.textContent = "";
        });

        map.on("click", (event) => {
          const activeLayers = clickableLayers.filter((layerId) => map.getLayer(layerId));
          const feature = map.queryRenderedFeatures(event.point, { layers: activeLayers })[0];
          if (!feature) {
            if (activePopup) activePopup.remove();
            activePopup = null;
            return;
          }

          if (activePopup) activePopup.remove();
          activePopup = new maplibregl.Popup({ closeButton: true, maxWidth: "360px" })
            .setLngLat(event.lngLat)
            .setHTML(popupHtml(feature))
            .addTo(map);
        });
      }

      function allCoordinates(geometry, out = []) {
        if (!geometry) return out;
        if (geometry.type === "Point") out.push(geometry.coordinates);
        if (geometry.type === "LineString" || geometry.type === "MultiPoint") out.push(...geometry.coordinates);
        if (geometry.type === "Polygon" || geometry.type === "MultiLineString") {
          geometry.coordinates.flat(1).forEach((coord) => out.push(coord));
        }
        if (geometry.type === "MultiPolygon") {
          geometry.coordinates.flat(2).forEach((coord) => out.push(coord));
        }
        return out;
      }

      function fitGeojsons(geojsons) {
        const coords = geojsons.flatMap((geojson) => geojson.features.flatMap((feature) => allCoordinates(feature.geometry)));
        if (!coords.length) return;
        const bounds = coords.reduce((box, coord) => box.extend(coord), new maplibregl.LngLatBounds(coords[0], coords[0]));
        map.fitBounds(bounds, { padding: { top: 110, right: 40, bottom: 260, left: 420 }, maxZoom: 13, duration: 700 });
      }

      function setVisibility(toggleName, visible) {
        for (const layerId of layerGroups[toggleName] || []) {
          if (map.getLayer(layerId)) {
            map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none");
          }
        }
      }

      function updateLayerGroupToggle(groupName) {
        const groupToggle = document.querySelector(`[data-layer-group-toggle="${groupName}"]`);
        if (!groupToggle) return;
        const layerToggles = (layerGroupControls[groupName] || [])
          .map((toggleName) => document.querySelector(`[data-layer-toggle="${toggleName}"]`))
          .filter(Boolean);
        const folderDataName = layerGroupFolderControls[groupName];
        const folderToggles = folderDataName
          ? [...document.querySelectorAll(`[data-${folderDataName}]`)]
          : [];
        const toggles = [...layerToggles, ...folderToggles];
        const checkedCount = toggles.filter((input) => input.checked).length;
        groupToggle.checked = toggles.length > 0 && checkedCount === toggles.length;
        groupToggle.indeterminate = checkedCount > 0 && checkedCount < toggles.length;
      }

      function updateAllLayerGroupToggles() {
        Object.keys(layerGroupControls).forEach(updateLayerGroupToggle);
      }

      function setLayerGroupVisibility(groupName, visible) {
        for (const toggleName of layerGroupControls[groupName] || []) {
          const input = document.querySelector(`[data-layer-toggle="${toggleName}"]`);
          if (input) input.checked = visible;
          setVisibility(toggleName, visible);
        }
        const folderDataName = layerGroupFolderControls[groupName];
        if (folderDataName) {
          document.querySelectorAll(`[data-${folderDataName}]`).forEach((input) => {
            input.checked = visible;
          });
          updateImprovementFolderFilters();
        }
        updateLayerGroupToggle(groupName);
      }

      function wireToggles() {
        document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
          input.addEventListener("change", () => {
            setVisibility(input.dataset.layerToggle, input.checked);
            updateAllLayerGroupToggles();
          });
        });
        document.querySelectorAll("[data-layer-group-toggle]").forEach((input) => {
          input.addEventListener("change", () => setLayerGroupVisibility(input.dataset.layerGroupToggle, input.checked));
        });
      }

      function wireCollapseControls() {
        document.querySelectorAll("[data-collapse-target]").forEach((button) => {
          button.addEventListener("click", () => {
            const target = document.getElementById(button.dataset.collapseTarget);
            if (!target) return;
            const expanded = button.getAttribute("aria-expanded") === "true";
            target.hidden = expanded;
            button.setAttribute("aria-expanded", String(!expanded));
            const label = button.getAttribute("aria-label") || "";
            button.setAttribute("aria-label", label.replace(expanded ? "Collapse" : "Expand", expanded ? "Expand" : "Collapse"));
            button.title = expanded ? "Expand" : "Collapse";
          });
        });
      }

      function syncLayerVisibilityFromControls() {
        document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
          setVisibility(input.dataset.layerToggle, input.checked);
        });
        updateAllLayerGroupToggles();
        updateImprovementFolderFilters();
      }

      function renderOverlays() {
        if (!overlays) return;
        if (map.getSource("srg")) {
          syncLayerVisibilityFromControls();
          return;
        }
        addLayers(overlays.srg, overlays.osm, overlays.google, overlays.improvements, overlays.improvements2026);
        syncLayerVisibilityFromControls();
      }

      function wireBasemapSelector() {
        const updateBasemapInfo = (styleName) => {
          const info = BASEMAP_INFO[styleName] || BASEMAP_INFO.osm;
          basemapInfoLink.href = info.url;
          basemapInfoLink.textContent = info.label;
        };

        basemapButtons.forEach((button) => button.addEventListener("click", async () => {
          if (button.getAttribute("aria-pressed") === "true") return;
          const createStyle = MAP_STYLES[button.dataset.basemapStyle] || MAP_STYLES.osm;
          const previousButton = basemapButtons.find((option) => option.getAttribute("aria-pressed") === "true");
          if (activePopup) activePopup.remove();
          activePopup = null;
          basemapButtons.forEach((option) => {
            option.disabled = true;
          });
          try {
            const style = await createStyle();
            basemapButtons.forEach((option) => {
              option.setAttribute("aria-pressed", String(option === button));
            });
            updateBasemapInfo(button.dataset.basemapStyle);
            map.once("style.load", () => {
              try {
                renderOverlays();
              } finally {
                basemapButtons.forEach((option) => {
                  option.disabled = false;
                });
              }
            });
            map.setStyle(style, { diff: false });
          } catch (error) {
            if (previousButton) previousButton.setAttribute("aria-pressed", "true");
            basemapButtons.forEach((option) => {
              option.disabled = false;
            });
            console.error(error);
            window.alert(error.message || "Unable to load the selected basemap.");
          }
        }));
      }

      function folderControlConfig(improvements) {
        const folders = [...new Set(improvements.features.map(featureFolder))].sort();
        const folderIndex = Object.fromEntries(folders.map((folder, index) => [folder, index]));
        return { folders, folderIndex };
      }

      function populateCounts(srg, osm, google, improvements, improvements2026) {
        setCount("srg-count", srg.features.length);
        setCount("osm-count", osm.features.length);
        setCount("google-count", google.features.length);
        setCount("improvements-count", improvements.features.length);
        setCount("improvements-2026-count", improvements2026.features.length);
        setCount("count-srg-active-off-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "active" && f.properties.alignment === "off_road"));
        setCount("count-srg-active-on-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "active" && f.properties.alignment === "on_road"));
        setCount("count-srg-proposed-off-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "proposed" && f.properties.alignment === "off_road"));
        setCount("count-srg-proposed-on-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "proposed" && f.properties.alignment === "on_road"));
        setCount("count-srg-trailheads", countFeatures(srg, (f) => f.properties.layer === "trailhead"));
        setCount("count-srg-towns", countFeatures(srg, (f) => f.properties.layer === "town"));
        setCount("count-srg-places", countFeatures(srg, (f) => f.properties.layer === "places_to_visit"));
        setCount("count-osm-srt", osm.features.length);
        setCount("count-google-places", google.features.length);
      }

      async function init() {
        try {
          const [rawSrg, osm, google, improvements, improvements2026, scrubRouteGeojson] = await Promise.all([
            loadGeojson(DATASETS.srg),
            loadGeojson(DATASETS.osm),
            loadGeojson(DATASETS.google),
            loadGeojson(DATASETS.improvements),
            loadGeojson(DATASETS.improvements2026),
            loadGeojson(DATASETS.scrubRoute),
          ]);
          const srg = withoutExcludedSrgFeatures(rawSrg);
          scrubRoute = prepareScrubRoute(scrubRouteGeojson);
          overlays = { srg, osm, google, improvements, improvements2026 };

          const render = () => {
            const folders2025 = folderControlConfig(improvements);
            const folders2026 = folderControlConfig(improvements2026);
            buildFolderControls("folder-list", "folder2025", folders2025.folders, folders2025.folderIndex, improvements);
            buildFolderControls("folder-list-2026", "folder2026", folders2026.folders, folders2026.folderIndex, improvements2026);
            renderOverlays();
            populateCounts(srg, osm, google, improvements, improvements2026);
            wireToggles();
            wireCollapseControls();
            wireBasemapSelector();
            fitGeojsons([srg, osm, google, improvements, improvements2026]);
            wireTrailScrubber(srg);
            addPopups();
          };

          if (map.loaded()) {
            render();
          } else {
            map.once("load", render);
          }
        } catch (error) {
          console.error(error);
        }
      }

      init();
    </script>
  </body>
</html>
