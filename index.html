<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schuylkill River Trail Map Sources</title>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" />
    <style>
      :root {
        --bg: #f5f3ef;
        --panel: #ffffff;
        --ink: #202124;
        --muted: #636b70;
        --rule: #d9d4ca;
        --green: #397550;
        --blue: #276b9f;
        --red: #d52022;
        --orange: #f99400;
        --purple: #7656a6;
        --shadow: 0 12px 30px rgba(28, 31, 34, 0.16);
        --scrubber-height: 98px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: var(--bg);
      }

      #map {
        position: fixed;
        inset: 0;
      }

      .panel {
        position: fixed;
        z-index: 2;
        left: 16px;
        top: 16px;
        width: min(380px, calc(100vw - 32px));
        max-height: calc(100vh - var(--scrubber-height) - 32px);
        overflow: auto;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--rule);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .panel-header {
        position: sticky;
        top: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px;
        background: rgba(255, 255, 255, 0.97);
        border-bottom: 1px solid var(--rule);
      }

      .panel-body[hidden],
      .group-body[hidden] {
        display: none;
      }

      .panel-title {
        font-size: 13px;
        font-weight: 750;
        text-transform: uppercase;
        color: #3a3e41;
      }

      button {
        appearance: none;
        border: 1px solid var(--rule);
        background: #fff;
        color: var(--ink);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        line-height: 1;
        padding: 8px 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: #aeb7b2;
      }

      .collapse-button {
        display: grid;
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        place-items: center;
        padding: 0;
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .collapse-button:hover {
        border-color: var(--rule);
        color: var(--ink);
      }

      .collapse-button svg {
        width: 14px;
        height: 14px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.8;
        transition: transform 160ms ease;
      }

      .collapse-button[aria-expanded="false"] svg {
        transform: rotate(-90deg);
      }

      .basemap-control {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 11px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .basemap-control label {
        display: block;
        min-height: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .basemap-toggle {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }

      .basemap-option {
        display: grid;
        grid-template-rows: 20px auto;
        gap: 3px;
        min-height: 50px;
        place-items: center;
        padding: 5px 3px 4px;
        border-radius: 0;
        color: var(--muted);
      }

      .basemap-option + .basemap-option {
        margin-left: -1px;
      }

      .basemap-option:first-child {
        border-radius: 6px 0 0 6px;
      }

      .basemap-option:last-child {
        border-radius: 0 6px 6px 0;
      }

      .basemap-option[aria-pressed="true"] {
        z-index: 1;
        border-color: var(--green);
        background: #edf5f0;
        color: var(--green);
      }

      .basemap-option svg {
        width: 19px;
        height: 19px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.6;
      }

      .basemap-option-label {
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      select {
        width: 100%;
        min-height: 34px;
        border: 1px solid var(--rule);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        padding: 6px 9px;
      }

      .group {
        padding: 13px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .group:last-child {
        border-bottom: 0;
      }

      .group-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 9px;
      }

      .group-head-actions {
        display: flex;
        align-items: center;
        gap: 3px;
      }

      .group-head:has(.collapse-button[aria-expanded="false"]) {
        margin-bottom: 0;
      }

      .group-toggle {
        display: grid;
        grid-template-columns: 18px 1fr;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .group h2 {
        margin: 0;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
        letter-spacing: 0;
      }

      .count {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      label {
        display: grid;
        grid-template-columns: 18px 18px 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 31px;
        color: #282d30;
        font-size: 13px;
        line-height: 1.25;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--green);
      }

      .swatch {
        width: 16px;
        height: 5px;
        border-radius: 999px;
        background: var(--muted);
      }

      .swatch.point {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        justify-self: center;
      }

      .swatch.poly {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        opacity: 0.75;
      }

      .swatch.dashed {
        background:
          linear-gradient(90deg, currentColor 0 45%, transparent 45% 65%, currentColor 65% 100%);
        color: var(--red);
      }

      .folder-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
      }


      .group-body {
        display: grid;
        grid-template-columns: 1fr;
      }

      .folder-list label {
        grid-template-columns: 18px 14px 1fr auto;
        font-size: 12px;
      }

      .mapboxgl-popup-content {
        max-width: min(340px, calc(100vw - 40px));
        padding: 13px 14px;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .popup-title {
        margin: 0 0 6px;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
      }

      .popup-meta {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-body {
        margin-top: 8px;
        color: #34383b;
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-link {
        display: inline-block;
        margin-top: 8px;
        color: var(--blue);
        font-size: 12px;
        text-decoration: none;
      }

      .popup-link:hover {
        text-decoration: underline;
      }

      .trail-scrubber {
        position: fixed;
        z-index: 4;
        right: 0;
        bottom: 0;
        left: 0;
        min-height: var(--scrubber-height);
        display: grid;
        grid-template-columns: minmax(180px, 1fr);
        align-items: center;
        padding: 10px 20px 8px;
        background: #fff;
        border-top: 1px solid var(--rule);
      }

      .scrubber-control {
        min-width: 0;
      }

      .scrubber-track {
        min-width: 0;
      }

      .scrubber-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 26px;
        margin-top: -1px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.2;
      }

      .scrubber-footer strong {
        color: var(--ink);
        font-size: 12px;
      }

      .scrubber-play {
        display: grid;
        width: 22px;
        height: 22px;
        place-items: center;
        padding: 0;
        border-color: #bec6c1;
        border-radius: 50%;
        color: var(--green);
      }

      .scrubber-play:hover {
        border-color: var(--green);
      }

      .scrubber-play svg {
        width: 10px;
        height: 10px;
        fill: currentColor;
      }

      .scrubber-play [hidden] {
        display: none;
      }

      .trail-range {
        --progress: 0%;
        display: block;
        width: 100%;
        height: 26px;
        margin: 0;
        padding: 0;
        appearance: none;
        background: transparent;
        cursor: ew-resize;
      }

      .trail-range:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 3px;
        border-radius: 999px;
      }

      .trail-range::-webkit-slider-runnable-track {
        height: 5px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--green) 0 var(--progress), #d9dedb var(--progress) 100%);
      }

      .trail-range::-webkit-slider-thumb {
        width: 19px;
        height: 19px;
        margin-top: -7px;
        appearance: none;
        border: 3px solid #fff;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 1px rgba(32, 33, 36, 0.28), 0 2px 5px rgba(32, 33, 36, 0.22);
      }

      .trail-range::-moz-range-track {
        height: 5px;
        border-radius: 999px;
        background: #d9dedb;
      }

      .trail-range::-moz-range-progress {
        height: 5px;
        border-radius: 999px;
        background: var(--green);
      }

      .trail-range::-moz-range-thumb {
        width: 15px;
        height: 15px;
        border: 3px solid #fff;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 1px rgba(32, 33, 36, 0.28), 0 2px 5px rgba(32, 33, 36, 0.22);
      }

      .trail-range:disabled {
        cursor: wait;
        opacity: 0.5;
      }

      .scrubber-stops {
        position: relative;
        height: 17px;
        margin: 0 0 -1px;
        pointer-events: none;
      }

      .scrubber-stop {
        position: absolute;
        top: 2px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
        line-height: 1;
        white-space: nowrap;
        transform: translateX(-50%);
      }

      .scrubber-stop::before {
        position: absolute;
        top: 12px;
        left: 50%;
        width: 1px;
        height: 4px;
        background: #929b96;
        content: "";
      }

      .scrubber-stop.endpoint-start {
        transform: none;
      }

      .scrubber-stop.endpoint-start::before {
        left: 0;
      }

      .scrubber-stop.endpoint-end {
        transform: translateX(-100%);
      }

      .scrubber-stop.endpoint-end::before {
        left: 100%;
      }

      .mapboxgl-ctrl-bottom-left,
      .mapboxgl-ctrl-bottom-right {
        bottom: var(--scrubber-height);
      }

      @media (max-width: 1000px) {
        .scrubber-stop[data-name="Manayunk"],
        .scrubber-stop[data-name="Phoenixville"],
        .scrubber-stop[data-name="Pottsville"] {
          display: none;
        }
      }

      @media (max-width: 760px) {
        :root {
          --scrubber-height: 96px;
        }

        .panel {
          left: 10px;
          right: 10px;
          top: 10px;
          width: auto;
          max-height: calc(100vh - var(--scrubber-height) - 20px);
        }

        .trail-scrubber {
          grid-template-columns: minmax(120px, 1fr);
          padding: 9px 10px 7px;
        }

        .scrubber-stop {
          font-size: 8px;
        }

      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <aside class="panel" aria-label="Layer controls">
      <div class="panel-header">
        <div class="panel-title">SRT Data Explorer</div>
        <button class="collapse-button" type="button" data-collapse-target="panel-body" aria-expanded="false" aria-controls="panel-body" aria-label="Expand SRT Data Explorer" title="Expand panel">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
        </button>
      </div>

      <div class="panel-body" id="panel-body" hidden>

      <section class="basemap-control">
        <label id="basemap-style-label">Map Style</label>
        <div class="basemap-toggle" role="group" aria-labelledby="basemap-style-label">
          <button class="basemap-option" type="button" data-basemap-style="outdoors" aria-label="Outdoors map style" aria-pressed="true" title="Outdoors">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m2.5 16 5.2-8 3 4.1 2.1-2.8 4.7 6.7Z" /><path d="m6.2 10.3 1.5-2.3 1.5 2" /></svg>
            <span class="basemap-option-label">Outdoors</span>
          </button>
          <button class="basemap-option" type="button" data-basemap-style="satellite" aria-label="Satellite map style" aria-pressed="false" title="Satellite">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 6.5h3l1.2-2h5.6l1.2 2h3v9H3Z" /><circle cx="10" cy="11" r="3" /></svg>
            <span class="basemap-option-label">Satellite</span>
          </button>
          <button class="basemap-option" type="button" data-basemap-style="light" aria-label="Light map style" aria-pressed="false" title="Light">
            <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="3.2" /><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.3 4.3l1.4 1.4M14.3 14.3l1.4 1.4M15.7 4.3l-1.4 1.4M5.7 14.3l-1.4 1.4" /></svg>
            <span class="basemap-option-label">Light</span>
          </button>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="srg" checked />
            <h2>SRG Website Data</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="srg-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="srg-layer-list" aria-expanded="true" aria-controls="srg-layer-list" aria-label="Collapse SRG Website Data layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="srg-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="srg-active-off-road" checked />
          <span class="swatch" style="background: #d52022"></span>
          <span>Active off-road SRT</span>
          <span class="count" id="count-srg-active-off-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-active-on-road" checked />
          <span class="swatch" style="background: #f99400"></span>
          <span>Active on-road SRT</span>
          <span class="count" id="count-srg-active-on-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-proposed-off-road" checked />
          <span class="swatch dashed"></span>
          <span>Proposed off-road SRT</span>
          <span class="count" id="count-srg-proposed-off-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-proposed-on-road" checked />
          <span class="swatch dashed" style="color: #f99400"></span>
          <span>Proposed on-road SRT</span>
          <span class="count" id="count-srg-proposed-on-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-trailheads" />
          <span class="swatch point" style="background: #074a67"></span>
          <span>Trailheads</span>
          <span class="count" id="count-srg-trailheads"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-towns" />
          <span class="swatch point" style="background: #6db220"></span>
          <span>Trail towns</span>
          <span class="count" id="count-srg-towns"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-places" />
          <span class="swatch point" style="background: #8d5b2d"></span>
          <span>Places to visit</span>
          <span class="count" id="count-srg-places"></span>
        </label>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="osm" checked />
            <h2>OpenStreetMap SRT Data</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="osm-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="osm-layer-list" aria-expanded="true" aria-controls="osm-layer-list" aria-label="Collapse OpenStreetMap SRT Data layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="osm-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="osm-srt" checked />
          <span class="swatch" style="background: #276b9f"></span>
          <span>OSM physical ways</span>
          <span class="count" id="count-osm-srt"></span>
        </label>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="google" />
            <h2>[WIP] Google Maps Search Results</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="google-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="google-layer-list" aria-expanded="true" aria-controls="google-layer-list" aria-label="Collapse [WIP] Google Maps Search Results layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="google-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="google-places" />
          <span class="swatch point" style="background: #4285f4"></span>
          <span>Places results</span>
          <span class="count" id="count-google-places"></span>
        </label>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="improvements-2026" checked />
            <h2>2026 Improvements Map</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="improvements-2026-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="improvements-2026-layer-list" aria-expanded="true" aria-controls="improvements-2026-layer-list" aria-label="Collapse 2026 Improvements Map layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="improvements-2026-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="improvements-2026-lines" checked />
          <span class="swatch" style="background: #2f7f84"></span>
          <span>Lines</span>
          <span class="count" id="count-improvements-2026-lines"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-2026-polygons" checked />
          <span class="swatch poly" style="background: #9a6b2f"></span>
          <span>Areas</span>
          <span class="count" id="count-improvements-2026-polygons"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-2026-points" checked />
          <span class="swatch point" style="background: #a24d74"></span>
          <span>Points</span>
          <span class="count" id="count-improvements-2026-points"></span>
        </label>
        <div class="folder-list" id="folder-list-2026"></div>
        </div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="improvements-2025" />
            <h2>2025 Improvements Map</h2>
          </label>
          <div class="group-head-actions">
            <span class="count" id="improvements-count">0</span>
            <button class="collapse-button" type="button" data-collapse-target="improvements-2025-layer-list" aria-expanded="true" aria-controls="improvements-2025-layer-list" aria-label="Collapse 2025 Improvements Map layers" title="Collapse layers">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m3 6 5 5 5-5" /></svg>
            </button>
          </div>
        </div>
        <div class="group-body" id="improvements-2025-layer-list">
        <label>
          <input type="checkbox" data-layer-toggle="improvements-lines" />
          <span class="swatch" style="background: #7656a6"></span>
          <span>Lines</span>
          <span class="count" id="count-improvements-lines"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-polygons" />
          <span class="swatch poly" style="background: #7c9554"></span>
          <span>Areas</span>
          <span class="count" id="count-improvements-polygons"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-points" />
          <span class="swatch point" style="background: #c9503c"></span>
          <span>Points</span>
          <span class="count" id="count-improvements-points"></span>
        </label>
        <div class="folder-list" id="folder-list"></div>
        </div>
      </section>
      </div>
    </aside>

    <footer class="trail-scrubber" aria-label="Explore the trail from source to end">
      <div class="scrubber-control">
        <div class="scrubber-track">
          <div class="scrubber-stops" id="scrubber-stops" aria-label="Trail towns"></div>
          <input
            class="trail-range"
            id="trail-range"
            type="range"
            min="0"

      function distanceMiles(first, second) {
        const toRadians = Math.PI / 180;
        const firstLat = first[1] * toRadians;
        const secondLat = second[1] * toRadians;
        const deltaLat = (second[1] - first[1]) * toRadians;
        const deltaLng = (second[0] - first[0]) * toRadians;
        const haversine =
          Math.sin(deltaLat / 2) ** 2 +
          Math.cos(firstLat) * Math.cos(secondLat) * Math.sin(deltaLng / 2) ** 2;
        return 3958.8 * 2 * Math.asin(Math.min(1, Math.sqrt(haversine)));
      }

      function prepareScrubRoute(geojson) {
        const coordinates = [...(geojson.features?.[0]?.geometry?.coordinates || [])];
        if (coordinates.length < 2) return null;
        const cumulative = [0];
        for (let index = 1; index < coordinates.length; index += 1) {
          cumulative.push(cumulative[index - 1] + distanceMiles(coordinates[index - 1], coordinates[index]));
        }
        return {
          coordinates,
          cumulative,
          totalMiles: cumulative[cumulative.length - 1],
        };
      }

      function routeFractionForCoordinate(point) {
        if (!scrubRoute) return 0;
        let closestGap = Infinity;
        let closestMiles = 0;
        for (let index = 1; index < scrubRoute.coordinates.length; index += 1) {
          const first = scrubRoute.coordinates[index - 1];
          const second = scrubRoute.coordinates[index];
          const latitudeScale = Math.cos(((first[1] + second[1]) / 2) * Math.PI / 180);
          const segmentX = (second[0] - first[0]) * latitudeScale;
          const segmentY = second[1] - first[1];
          const pointX = (point[0] - first[0]) * latitudeScale;
          const pointY = point[1] - first[1];
          const segmentLengthSquared = segmentX ** 2 + segmentY ** 2;
          const amount = segmentLengthSquared
            ? Math.max(0, Math.min(1, (pointX * segmentX + pointY * segmentY) / segmentLengthSquared))
            : 0;
          const projected = [
            first[0] + (second[0] - first[0]) * amount,
            first[1] + (second[1] - first[1]) * amount,
          ];
          const gap = distanceMiles(point, projected);
          if (gap < closestGap) {
            closestGap = gap;
            const segmentMiles = scrubRoute.cumulative[index] - scrubRoute.cumulative[index - 1];
            closestMiles = scrubRoute.cumulative[index - 1] + segmentMiles * amount;
          }
        }
        return closestMiles / scrubRoute.totalMiles;
      }

      function buildScrubberStops(srg) {
        scrubberStops.innerHTML = "";
        const stops = [
          { name: "Philadelphia", fraction: 0, endpoint: "start" },
          { name: "Frackville", fraction: 1, endpoint: "end" },
        ];
        for (const name of ["Manayunk", "Phoenixville", "Pottstown", "Reading", "Hamburg", "Pottsville"]) {
          const town = srg.features.find(
            (feature) => feature.properties?.layer === "town" && feature.properties?.name === name,
          );
          if (!town || town.geometry?.type !== "Point") continue;
          const fraction = routeFractionForCoordinate(town.geometry.coordinates);
          stops.push({ name, fraction });
        }
        stops.sort((first, second) => first.fraction - second.fraction);
        for (const { name, fraction, endpoint } of stops) {
          const label = document.createElement("span");
          label.className = `scrubber-stop${endpoint ? ` endpoint-${endpoint}` : ""}`;
          label.dataset.name = name;
          label.style.left = `${(fraction * 100).toFixed(2)}%`;
          label.textContent = name;
          label.title = `${name} · ${(fraction * scrubRoute.totalMiles).toFixed(1)} mi`;
          scrubberStops.appendChild(label);
        }
      }

      function scrubPosition(fraction) {
        if (!scrubRoute) return null;
        const target = Math.max(0, Math.min(1, fraction)) * scrubRoute.totalMiles;
        let low = 0;
        let high = scrubRoute.cumulative.length - 1;
        while (low < high) {
          const middle = Math.floor((low + high) / 2);
          if (scrubRoute.cumulative[middle] < target) low = middle + 1;
          else high = middle;
        }

        const after = Math.max(1, low);
        const before = after - 1;
        const span = scrubRoute.cumulative[after] - scrubRoute.cumulative[before];
        const amount = span ? (target - scrubRoute.cumulative[before]) / span : 0;
        const first = scrubRoute.coordinates[before];
        const second = scrubRoute.coordinates[after];
        const coordinate = [
          first[0] + (second[0] - first[0]) * amount,
          first[1] + (second[1] - first[1]) * amount,
        ];
        return { coordinate, miles: target };
      }

      function milesFromLocationHash() {

        const miles = Number(value);
        if (!Number.isFinite(miles) || miles < 0 || miles > scrubRoute.totalMiles) return null;
        return miles;
      }

      function setScrubberMiles(miles, moveCamera = true) {
        const fraction = miles / scrubRoute.totalMiles;

      function updateLocationHash(fraction) {

      function updateTrailScrubber(fraction, moveCamera = true) {
        const position = scrubPosition(fraction);
        if (!position) return;
        const percent = Math.round(fraction * 100);
        trailRange.style.setProperty("--progress", `${percent}%`);

      function animateTrailPlayback(timestamp) {

      function toggleTrailPlayback() {

      function wireTrailScrubber(srg) {
        if (!scrubRoute) {

        scrubberPlay.addEventListener("click", toggleTrailPlayback);
        trailRange.addEventListener("input", () => {
          pauseTrailPlayback();
          scrubPlaybackValue = Number(trailRange.value);
          updateLocationHash(scrubPlaybackValue / Number(trailRange.max));
          if (scrubFrame) cancelAnimationFrame(scrubFrame);
          scrubFrame = requestAnimationFrame(() => {
            updateTrailScrubber(Number(trailRange.value) / Number(trailRange.max));
            scrubFrame = null;
          });
        });
        document.addEventListener("pointerdown", (event) => {
          if (event.target instanceof Element && event.target.closest("#scrubber-play")) return;
          pauseTrailPlayback();
        });
        document.addEventListener("wheel", pauseTrailPlayback, { passive: true });
        document.addEventListener("keydown", (event) => {
          if (event.target instanceof Element && event.target.closest("#scrubber-play")) return;

        window.addEventListener("hashchange", () => {

        window.addEventListener("blur", pauseTrailPlayback);

      function addTrailScrubberMarker() {
        if (!scrubRoute || map.getSource("trail-scrub-position")) return;

      function addLayers(srg, osm, google, improvements, improvements2026) {
        const folders = [...new Set(improvements.features.map(featureFolder))].sort();
        const folderIndex = Object.fromEntries(folders.map((folder, index) => [folder, index]));
        const improvementColor = buildMatchExpression(folderIndex);
        const folders2026 = [...new Set(improvements2026.features.map(featureFolder))].sort();
        const folderIndex2026 = Object.fromEntries(folders2026.map((folder, index) => [folder, index]));
        const improvementColor2026 = buildMatchExpression(folderIndex2026);

        map.addSource("srg", { type: "geojson", data: srg });
        map.addSource("osm-srt", { type: "geojson", data: osm });
        map.addSource("google-places", { type: "geojson", data: google });
        map.addSource("improvements", { type: "geojson", data: improvements });
        map.addSource("improvements-2026", { type: "geojson", data: improvements2026 });

        map.addLayer({
          id: "srg-active-off-road",
          type: "line",
          source: "srg",
          filter: ["all", ["==", ["get", "layer"], "trail"], ["==", ["get", "status"], "active"], ["==", ["get", "alignment"], "off_road"]],
          paint: { "line-color": ["coalesce", ["get", "color"], "#d52022"], "line-width": 5, "line-opacity": 0.9 },

          type: "line",
          source: "srg",
          filter: ["all", ["==", ["get", "layer"], "trail"], ["==", ["get", "status"], "active"], ["==", ["get", "alignment"], "on_road"]],
          paint: { "line-color": ["coalesce", ["get", "color"], "#f99400"], "line-width": 4, "line-opacity": 0.9 },
        });

        map.addLayer({
          id: "srg-proposed-off-road",
          type: "line",
          source: "srg",

        map.addLayer({

            "circle-stroke-color": "#fff",

        });

        map.addLayer({
          id: "improvements-2026-polygons-outline",
          type: "line",
          source: "improvements-2026",
          filter: ["==", ["geometry-type"], "Polygon"],
          paint: { "line-color": improvementColor2026, "line-width": 2, "line-opacity": 0.85 },
        });

        map.addLayer({
          id: "improvements-2026-lines",
          type: "line",
          source: "improvements-2026",
          filter: ["==", ["geometry-type"], "LineString"],
          paint: { "line-color": improvementColor2026, "line-width": 3.5, "line-opacity": 0.82, "line-dasharray": [1.4, 1.2] },
        });

        map.addLayer({
          id: "improvements-2026-points",
          type: "circle",
          source: "improvements-2026",

          paint: { "circle-color": improvementColor2026, "circle-radius": zoomRadius(4.8), "circle-stroke-color": "#fff", "circle-stroke-width": 1.3 },
        });

        addTrailScrubberMarker();
      }

      function buildFolderControls(containerId, dataName, folders, folderIndex, improvements) {
        const folderList = document.getElementById(containerId);
        folderList.innerHTML = "";
        const checkedByDefault = dataName !== "folder2025";

        for (const folder of folders) {
          const id = `${dataName}-${folder.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}`;
          const count = countFeatures(improvements, (feature) => featureFolder(feature) === folder);
          const label = document.createElement("label");
          label.innerHTML = `
            <input id="${id}" type="checkbox" data-${dataName}="${escapeHtml(folder)}"${checkedByDefault ? " checked" : ""} />
            <span class="swatch point" style="background: ${folderColor(folder, folderIndex)}"></span>
            <span>${escapeHtml(folder)}</span>
            <span class="count">${count.toLocaleString()}</span>
          `;
          folderList.appendChild(label);
        }

        folderList.addEventListener("change", () => {
          updateImprovementFolderFilters();
          updateAllLayerGroupToggles();
        });
      }

      function updateImprovementFolderFilter(dataName, layerIds) {
        const checked = [...document.querySelectorAll(`[data-${dataName}]:checked`)].map((input) => input.dataset[dataName]);
        const folderFilter = checked.length
          ? ["in", ["coalesce", ["get", "folder"], "Unsorted"], ["literal", checked]]
          : ["==", ["get", "__never__"], "__none__"];

        for (const layerId of layerIds) {
          if (!map.getLayer(layerId)) continue;
          const geom =
            layerId.includes("lines")
              ? "LineString"
              : layerId.includes("points")
                ? "Point"
                : "Polygon";
          map.setFilter(layerId, ["all", ["==", ["geometry-type"], geom], folderFilter]);
        }
      }

      function updateImprovementFolderFilters() {
        updateImprovementFolderFilter("folder2025", ["improvements-lines", "improvements-polygons-fill", "improvements-polygons-outline", "improvements-points"]);
        updateImprovementFolderFilter("folder2026", ["improvements-2026-lines", "improvements-2026-polygons-fill", "improvements-2026-polygons-outline", "improvements-2026-points"]);
      }

      function addPopups() {
        map.on("mousemove", (event) => {
          const activeLayers = clickableLayers.filter((layerId) => map.getLayer(layerId));
          const features = activeLayers.length
            ? map.queryRenderedFeatures(event.point, { layers: activeLayers })
            : [];
          map.getCanvas().style.cursor = features.length ? "pointer" : "";
        });

        map.on("click", (event) => {
          const activeLayers = clickableLayers.filter((layerId) => map.getLayer(layerId));
          const feature = map.queryRenderedFeatures(event.point, { layers: activeLayers })[0];
          if (!feature) {
            if (activePopup) activePopup.remove();
            activePopup = null;
            return;
          }

          if (activePopup) activePopup.remove();
          activePopup = new mapboxgl.Popup({ closeButton: true, maxWidth: "360px" })
            .setLngLat(event.lngLat)
            .setHTML(popupHtml(feature))
            .addTo(map);
        });
      }

      function allCoordinates(geometry, out = []) {
        if (!geometry) return out;
        if (geometry.type === "Point") out.push(geometry.coordinates);
        if (geometry.type === "LineString" || geometry.type === "MultiPoint") out.push(...geometry.coordinates);
        if (geometry.type === "Polygon" || geometry.type === "MultiLineString") {
          geometry.coordinates.flat(1).forEach((coord) => out.push(coord));
        }
        if (geometry.type === "MultiPolygon") {
          geometry.coordinates.flat(2).forEach((coord) => out.push(coord));
        }
        return out;
      }

      function fitGeojsons(geojsons) {
        const coords = geojsons.flatMap((geojson) => geojson.features.flatMap((feature) => allCoordinates(feature.geometry)));
        if (!coords.length) return;
        const bounds = coords.reduce((box, coord) => box.extend(coord), new mapboxgl.LngLatBounds(coords[0], coords[0]));
        map.fitBounds(bounds, { padding: { top: 110, right: 40, bottom: 260, left: 420 }, maxZoom: 13, duration: 700 });
      }

      function setVisibility(toggleName, visible) {
        for (const layerId of layerGroups[toggleName] || []) {
          if (map.getLayer(layerId)) {
            map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none");
          }
        }
      }

      function updateLayerGroupToggle(groupName) {
        const groupToggle = document.querySelector(`[data-layer-group-toggle="${groupName}"]`);
        if (!groupToggle) return;
        const layerToggles = (layerGroupControls[groupName] || [])
          .map((toggleName) => document.querySelector(`[data-layer-toggle="${toggleName}"]`))
          .filter(Boolean);
        const folderDataName = layerGroupFolderControls[groupName];
        const folderToggles = folderDataName
          ? [...document.querySelectorAll(`[data-${folderDataName}]`)]
          : [];
        const toggles = [...layerToggles, ...folderToggles];
        const checkedCount = toggles.filter((input) => input.checked).length;
        groupToggle.checked = toggles.length > 0 && checkedCount === toggles.length;
        groupToggle.indeterminate = checkedCount > 0 && checkedCount < toggles.length;
      }

      function updateAllLayerGroupToggles() {
        Object.keys(layerGroupControls).forEach(updateLayerGroupToggle);
      }

      function setLayerGroupVisibility(groupName, visible) {
        for (const toggleName of layerGroupControls[groupName] || []) {
          const input = document.querySelector(`[data-layer-toggle="${toggleName}"]`);
          if (input) input.checked = visible;
          setVisibility(toggleName, visible);
        }
        const folderDataName = layerGroupFolderControls[groupName];
        if (folderDataName) {
          document.querySelectorAll(`[data-${folderDataName}]`).forEach((input) => {
            input.checked = visible;
          });
          updateImprovementFolderFilters();
        }
        updateLayerGroupToggle(groupName);
      }

      function wireToggles() {
        document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
          input.addEventListener("change", () => {
            setVisibility(input.dataset.layerToggle, input.checked);
            updateAllLayerGroupToggles();
          });
        });
        document.querySelectorAll("[data-layer-group-toggle]").forEach((input) => {
          input.addEventListener("change", () => setLayerGroupVisibility(input.dataset.layerGroupToggle, input.checked));
        });
      }

      function wireCollapseControls() {
        document.querySelectorAll("[data-collapse-target]").forEach((button) => {
          button.addEventListener("click", () => {
            const target = document.getElementById(button.dataset.collapseTarget);
            if (!target) return;
            const expanded = button.getAttribute("aria-expanded") === "true";
            target.hidden = expanded;
            button.setAttribute("aria-expanded", String(!expanded));
            const label = button.getAttribute("aria-label") || "";
            button.setAttribute("aria-label", label.replace(expanded ? "Collapse" : "Expand", expanded ? "Expand" : "Collapse"));
            button.title = expanded ? "Expand" : "Collapse";
          });
        });
      }

      function syncLayerVisibilityFromControls() {
        document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
          setVisibility(input.dataset.layerToggle, input.checked);
        });
        updateAllLayerGroupToggles();
        updateImprovementFolderFilters();
      }

      function renderOverlays() {
        if (!overlays) return;
        if (map.getSource("srg")) {
          syncLayerVisibilityFromControls();
          return;
        }
        addLayers(overlays.srg, overlays.osm, overlays.google, overlays.improvements, overlays.improvements2026);
        syncLayerVisibilityFromControls();
      }

      function wireBasemapSelector() {
        basemapButtons.forEach((button) => button.addEventListener("click", () => {
          if (button.getAttribute("aria-pressed") === "true") return;
          const createStyle = MAP_STYLES[button.dataset.basemapStyle] || MAP_STYLES.outdoors;
          if (activePopup) activePopup.remove();
          activePopup = null;
          basemapButtons.forEach((option) => {
            option.disabled = true;
            option.setAttribute("aria-pressed", String(option === button));
          });
          map.once("style.load", () => {
            try {
              renderOverlays();
            } finally {
              basemapButtons.forEach((option) => {
                option.disabled = false;
              });
            }
          });
          map.setStyle(createStyle(), { diff: false });
        }));
      }

      function folderControlConfig(improvements) {
        const folders = [...new Set(improvements.features.map(featureFolder))].sort();
        const folderIndex = Object.fromEntries(folders.map((folder, index) => [folder, index]));
        return { folders, folderIndex };
      }

      function populateCounts(srg, osm, google, improvements, improvements2026) {
        setCount("srg-count", srg.features.length);
        setCount("osm-count", osm.features.length);
        setCount("google-count", google.features.length);
        setCount("improvements-count", improvements.features.length);
        setCount("improvements-2026-count", improvements2026.features.length);
        setCount("count-srg-active-off-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "active" && f.properties.alignment === "off_road"));
        setCount("count-srg-active-on-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "active" && f.properties.alignment === "on_road"));
        setCount("count-srg-proposed-off-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "proposed" && f.properties.alignment === "off_road"));
        setCount("count-srg-proposed-on-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "proposed" && f.properties.alignment === "on_road"));
        setCount("count-srg-trailheads", countFeatures(srg, (f) => f.properties.layer === "trailhead"));
        setCount("count-srg-towns", countFeatures(srg, (f) => f.properties.layer === "town"));
        setCount("count-srg-places", countFeatures(srg, (f) => f.properties.layer === "places_to_visit"));
        setCount("count-osm-srt", osm.features.length);
        setCount("count-google-places", google.features.length);
        setCount("count-improvements-lines", countFeatures(improvements, (f) => f.geometry?.type === "LineString"));
        setCount("count-improvements-polygons", countFeatures(improvements, (f) => f.geometry?.type === "Polygon"));
        setCount("count-improvements-points", countFeatures(improvements, (f) => f.geometry?.type === "Point"));
        setCount("count-improvements-2026-lines", countFeatures(improvements2026, (f) => f.geometry?.type === "LineString"));
        setCount("count-improvements-2026-polygons", countFeatures(improvements2026, (f) => f.geometry?.type === "Polygon"));
        setCount("count-improvements-2026-points", countFeatures(improvements2026, (f) => f.geometry?.type === "Point"));
      }

      async function init() {
        try {
          const [rawSrg, osm, google, improvements, improvements2026, scrubRouteGeojson] = await Promise.all([
            loadGeojson(DATASETS.srg),
            loadGeojson(DATASETS.osm),
            loadGeojson(DATASETS.google),
            loadGeojson(DATASETS.improvements),
            loadGeojson(DATASETS.improvements2026),
            loadGeojson(DATASETS.scrubRoute),
          ]);
          const srg = withoutExcludedSrgFeatures(rawSrg);
          scrubRoute = prepareScrubRoute(scrubRouteGeojson);
          overlays = { srg, osm, google, improvements, improvements2026 };

          const render = () => {
            const folders2025 = folderControlConfig(improvements);
            const folders2026 = folderControlConfig(improvements2026);
            buildFolderControls("folder-list", "folder2025", folders2025.folders, folders2025.folderIndex, improvements);
            buildFolderControls("folder-list-2026", "folder2026", folders2026.folders, folders2026.folderIndex, improvements2026);
            renderOverlays();
            populateCounts(srg, osm, google, improvements, improvements2026);
            wireToggles();
            wireCollapseControls();
            wireBasemapSelector();
            fitGeojsons([srg, osm, google, improvements, improvements2026]);
            wireTrailScrubber(srg);
            addPopups();
          };

          if (map.loaded()) {
            render();
          } else {
            map.once("load", render);
          }
        } catch (error) {
          console.error(error);
        }
      }

      init();
    </script>
  </body>
</html>
