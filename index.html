<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schuylkill River Trail Map Sources</title>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" />
    <style>
      :root {
        --bg: #f5f3ef;
        --panel: #ffffff;
        --ink: #202124;
        --muted: #636b70;
        --rule: #d9d4ca;
        --green: #397550;
        --blue: #276b9f;
        --red: #d52022;
        --orange: #f99400;
        --purple: #7656a6;
        --shadow: 0 12px 30px rgba(28, 31, 34, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: var(--bg);
      }

      #map {
        position: fixed;
        inset: 0;
      }

      .panel {
        position: fixed;
        z-index: 2;
        left: 16px;
        bottom: 24px;
        width: min(380px, calc(100vw - 32px));
        max-height: min(66vh, 680px);
        overflow: auto;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--rule);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .panel-header {
        position: sticky;
        top: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px;
        background: rgba(255, 255, 255, 0.97);
        border-bottom: 1px solid var(--rule);
      }

      .panel-title {
        font-size: 13px;
        font-weight: 750;
        text-transform: uppercase;
        color: #3a3e41;
      }

      .panel-meta {
        margin-top: 3px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.25;
        text-transform: none;
      }

      button {
        appearance: none;
        border: 1px solid var(--rule);
        background: #fff;
        color: var(--ink);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        line-height: 1;
        padding: 8px 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: #aeb7b2;
      }

      .basemap-control {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 11px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .basemap-control label {
        display: block;
        min-height: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      select {
        width: 100%;
        min-height: 34px;
        border: 1px solid var(--rule);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        padding: 6px 9px;
      }

      .group {
        padding: 13px 14px;
        border-bottom: 1px solid var(--rule);
      }

      .group:last-child {
        border-bottom: 0;
      }

      .group-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 9px;
      }

      .group-toggle {
        display: grid;
        grid-template-columns: 18px 1fr;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .group h2 {
        margin: 0;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
        letter-spacing: 0;
      }

      .count {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      label {
        display: grid;
        grid-template-columns: 18px 18px 1fr auto;
        align-items: center;
        gap: 8px;
        min-height: 31px;
        color: #282d30;
        font-size: 13px;
        line-height: 1.25;
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--green);
      }

      .swatch {
        width: 16px;
        height: 5px;
        border-radius: 999px;
        background: var(--muted);
      }

      .swatch.point {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        justify-self: center;
      }

      .swatch.poly {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        opacity: 0.75;
      }

      .swatch.dashed {
        background:
          linear-gradient(90deg, currentColor 0 45%, transparent 45% 65%, currentColor 65% 100%);
        color: var(--red);
      }

      .folder-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .folder-list label {
        grid-template-columns: 18px 14px 1fr auto;
        font-size: 12px;
      }

      .mapboxgl-popup-content {
        max-width: min(340px, calc(100vw - 40px));
        padding: 13px 14px;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .popup-title {
        margin: 0 0 6px;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 750;
      }

      .popup-meta {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-body {
        margin-top: 8px;
        color: #34383b;
        font-size: 12px;
        line-height: 1.4;
      }

      .popup-link {
        display: inline-block;
        margin-top: 8px;
        color: var(--blue);
        font-size: 12px;
        text-decoration: none;
      }

      .popup-link:hover {
        text-decoration: underline;
      }

      @media (max-width: 760px) {
        .panel {
          left: 10px;
          right: 10px;
          bottom: 16px;
          width: auto;
          max-height: 48vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <aside class="panel" aria-label="Layer controls">
      <div class="panel-header">
        <div>
          <div class="panel-title">SRG Map Sources</div>
          <div class="panel-meta" id="status">Loading map data</div>
        </div>
        <button id="fit-visible" type="button">Fit Visible</button>
      </div>

      <section class="basemap-control">
        <label for="basemap-style">Map Style</label>
        <select id="basemap-style">
          <option value="outdoors">Outdoors</option>
          <option value="streets">Streets</option>
          <option value="satellite-streets">Satellite Streets</option>
          <option value="satellite">Satellite</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="srg" checked />
            <h2>SRG Website Map</h2>
          </label>
          <span class="count" id="srg-count">0</span>
        </div>
        <label>
          <input type="checkbox" data-layer-toggle="srg-active-off-road" checked />
          <span class="swatch" style="background: #d52022"></span>
          <span>Active off-road SRT</span>
          <span class="count" id="count-srg-active-off-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-active-on-road" checked />
          <span class="swatch" style="background: #f99400"></span>
          <span>Active on-road SRT</span>
          <span class="count" id="count-srg-active-on-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-proposed-off-road" checked />
          <span class="swatch dashed"></span>
          <span>Proposed off-road SRT</span>
          <span class="count" id="count-srg-proposed-off-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-proposed-on-road" checked />
          <span class="swatch dashed" style="color: #f99400"></span>
          <span>Proposed on-road SRT</span>
          <span class="count" id="count-srg-proposed-on-road"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-trailheads" checked />
          <span class="swatch point" style="background: #074a67"></span>
          <span>Trailheads</span>
          <span class="count" id="count-srg-trailheads"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-towns" checked />
          <span class="swatch point" style="background: #6db220"></span>
          <span>Trail towns</span>
          <span class="count" id="count-srg-towns"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="srg-places" checked />
          <span class="swatch point" style="background: #8d5b2d"></span>
          <span>Places to visit</span>
          <span class="count" id="count-srg-places"></span>
        </label>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="osm" checked />
            <h2>OpenStreetMap SRT</h2>
          </label>
          <span class="count" id="osm-count">0</span>
        </div>
        <label>
          <input type="checkbox" data-layer-toggle="osm-srt" checked />
          <span class="swatch" style="background: #276b9f"></span>
          <span>OSM physical ways</span>
          <span class="count" id="count-osm-srt"></span>
        </label>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="improvements-2025" checked />
            <h2>2025 Improvements</h2>
          </label>
          <span class="count" id="improvements-count">0</span>
        </div>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-lines" checked />
          <span class="swatch" style="background: #7656a6"></span>
          <span>Lines</span>
          <span class="count" id="count-improvements-lines"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-polygons" checked />
          <span class="swatch poly" style="background: #7c9554"></span>
          <span>Areas</span>
          <span class="count" id="count-improvements-polygons"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-points" checked />
          <span class="swatch point" style="background: #c9503c"></span>
          <span>Points</span>
          <span class="count" id="count-improvements-points"></span>
        </label>
        <div class="folder-list" id="folder-list"></div>
      </section>

      <section class="group">
        <div class="group-head">
          <label class="group-toggle">
            <input type="checkbox" data-layer-group-toggle="improvements-2026" checked />
            <h2>2026 Improvements</h2>
          </label>
          <span class="count" id="improvements-2026-count">0</span>
        </div>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-2026-lines" checked />
          <span class="swatch" style="background: #2f7f84"></span>
          <span>Lines</span>
          <span class="count" id="count-improvements-2026-lines"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-2026-polygons" checked />
          <span class="swatch poly" style="background: #9a6b2f"></span>
          <span>Areas</span>
          <span class="count" id="count-improvements-2026-polygons"></span>
        </label>
        <label>
          <input type="checkbox" data-layer-toggle="improvements-2026-points" checked />
          <span class="swatch point" style="background: #a24d74"></span>
          <span>Points</span>
          <span class="count" id="count-improvements-2026-points"></span>
        </label>
        <div class="folder-list" id="folder-list-2026"></div>
      </section>
    </aside>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
    <script>
      mapboxgl.accessToken =
        "pk.eyJ1IjoicmV1c3RsZSIsImEiOiJjbXBzZXE4ZnMxN2t4MnNvaDE4cmlxOWUxIn0.REzLL46mXYr71ad-zW02Xg";

      const MAP_STYLES = {
        outdoors: "mapbox://styles/mapbox/outdoors-v12",
        streets: "mapbox://styles/mapbox/streets-v12",
        "satellite-streets": "mapbox://styles/mapbox/satellite-streets-v12",
        satellite: "mapbox://styles/mapbox/satellite-v9",
        light: "mapbox://styles/mapbox/light-v11",
        dark: "mapbox://styles/mapbox/dark-v11",
      };

      const DATASETS = {
        srg: "srg-website-map.geojson",
        osm: "srt-osm.geojson",
        improvements: "2025-Improvement-Map.geojson",
        improvements2026: "2026-Improvement-Map.geojson",
      };

      const layerGroups = {
        "srg-active-off-road": ["srg-active-off-road"],
        "srg-active-on-road": ["srg-active-on-road"],
        "srg-proposed-off-road": ["srg-proposed-off-road"],
        "srg-proposed-on-road": ["srg-proposed-on-road"],
        "srg-trailheads": ["srg-trailheads", "srg-trailheads-icons"],
        "srg-towns": ["srg-towns", "srg-towns-icons"],
        "srg-places": ["srg-places", "srg-places-icons"],
        "osm-srt": ["osm-srt"],
        "improvements-lines": ["improvements-lines"],
        "improvements-polygons": ["improvements-polygons-fill", "improvements-polygons-outline"],
        "improvements-points": ["improvements-points", "improvements-points-icons"],
        "improvements-2026-lines": ["improvements-2026-lines"],
        "improvements-2026-polygons": ["improvements-2026-polygons-fill", "improvements-2026-polygons-outline"],
        "improvements-2026-points": ["improvements-2026-points", "improvements-2026-points-icons"],
      };

      const layerGroupControls = {
        srg: [
          "srg-active-off-road",
          "srg-active-on-road",
          "srg-proposed-off-road",
          "srg-proposed-on-road",
          "srg-trailheads",
          "srg-towns",
          "srg-places",
        ],
        osm: ["osm-srt"],
        "improvements-2025": ["improvements-lines", "improvements-polygons", "improvements-points"],
        "improvements-2026": ["improvements-2026-lines", "improvements-2026-polygons", "improvements-2026-points"],
      };

      const layerGroupFolderControls = {
        "improvements-2025": "folder2025",
        "improvements-2026": "folder2026",
      };

      const excludedSrgPostIds = new Set([1796]);

      const folderColors = [
        "#c9503c",
        "#397550",
        "#276b9f",
        "#7656a6",
        "#b77d2c",
        "#6d6f2d",
        "#a24d74",
        "#4f7e86",
      ];

      const clickableLayers = [
        "srg-active-off-road",
        "srg-active-on-road",
        "srg-proposed-off-road",
        "srg-proposed-on-road",
        "srg-trailheads",
        "srg-trailheads-icons",
        "srg-towns",
        "srg-towns-icons",
        "srg-places",
        "srg-places-icons",
        "osm-srt",
        "improvements-lines",
        "improvements-polygons-fill",
        "improvements-points",
        "improvements-points-icons",
        "improvements-2026-lines",
        "improvements-2026-polygons-fill",
        "improvements-2026-points",
        "improvements-2026-points-icons",
      ];

      const status = document.getElementById("status");
      const basemapStyle = document.getElementById("basemap-style");
      let activePopup = null;
      let overlays = null;

      const setStatus = (text, good = true) => {
        status.textContent = text;
        status.style.color = good ? "#636b70" : "#c9503c";
      };

      const map = new mapboxgl.Map({
        container: "map",
        style: MAP_STYLES.outdoors,
        center: [-75.75, 40.22],
        zoom: 8.2,
        maxZoom: 22,
      });

      map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), "top-right");
      map.addControl(new mapboxgl.ScaleControl({ maxWidth: 140, unit: "imperial" }), "bottom-right");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function htmlToText(value) {
        if (!value) return "";
        const doc = new DOMParser().parseFromString(value, "text/html");
        return (doc.body.textContent || "").replace(/\s+/g, " ").trim();
      }

      function sourcePageUrl(feature) {
        const props = feature.properties || {};
        if (props.source_page_url) return props.source_page_url;
        if (props.osm_url) return props.osm_url;
        if (props.source_urlpath) return new URL(props.source_urlpath, "https://schuylkillriver.org").href;
        if (props.source_url) return props.source_url;
        return "";
      }

      function sourceLabel(feature) {
        const props = feature.properties || {};
        const source = feature.source || "";
        if (source === "improvements") return "2025 improvements";
        if (source === "improvements-2026") return "2026 improvements";
        if (source === "osm-srt" || props.osm_id) return "OSM";
        if (source === "srg") return props.layer ? `SRG ${props.layer}` : "SRG";
        return props.layer || "Map feature";
      }

      function popupHtml(feature) {
        const props = feature.properties || {};
        const layer = sourceLabel(feature);
        const title =
          props.display_name ||
          props.name ||
          props.placemark_name ||
          props.osm_name ||
          props.segment_name ||
          props.folder ||
          "Map feature";
        const bits = [];

        if (props.status || props.alignment) bits.push([props.status, props.alignment].filter(Boolean).join(" / "));
        if (props.folder) bits.push(props.folder);
        if (props.surface) bits.push(`surface: ${props.surface}`);
        if (props.highway) bits.push(`highway: ${props.highway}`);
        if (props.source_post_id) bits.push(`SRG post ${props.source_post_id}`);
        if (props.osm_id) bits.push(`OSM ${props.osm_type || "way"} ${props.osm_id}`);

        const body =
          htmlToText(props.infowindow_html || props.description_html || props.description).slice(0, 560);
        const url = sourcePageUrl(feature);

        return `
          <h3 class="popup-title">${escapeHtml(title)}</h3>
          <p class="popup-meta">${escapeHtml([layer, ...bits].filter(Boolean).join(" · "))}</p>
          ${body ? `<div class="popup-body">${escapeHtml(body)}</div>` : ""}
          ${url ? `<a class="popup-link" href="${escapeHtml(url)}" target="_blank" rel="noreferrer">Open source</a>` : ""}
        `;
      }

      async function loadGeojson(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${url}: ${response.status}`);
        return response.json();
      }

      function withoutExcludedSrgFeatures(geojson) {
        return {
          ...geojson,
          features: geojson.features.filter((feature) => !excludedSrgPostIds.has(feature.properties?.source_post_id)),
        };
      }

      function countFeatures(geojson, predicate) {
        return geojson.features.filter(predicate).length;
      }

      function setCount(id, value) {
        document.getElementById(id).textContent = value.toLocaleString();
      }

      function featureFolder(feature) {
        return feature.properties?.folder || "Unsorted";
      }

      function folderColor(folder, folderIndex) {
        return folderColors[folderIndex[folder] % folderColors.length];
      }

      function buildMatchExpression(folderIndex) {
        const expression = ["match", ["coalesce", ["get", "folder"], "Unsorted"]];
        for (const folder of Object.keys(folderIndex)) {
          expression.push(folder, folderColor(folder, folderIndex));
        }
        expression.push("#c9503c");
        return expression;
      }

      function iconMatchExpression(folderIndex, prefix) {
        const expression = ["match", ["coalesce", ["get", "folder"], "Unsorted"]];
        for (const folder of Object.keys(folderIndex)) {
          expression.push(folder, `${prefix}-${folderIndex[folder] % folderColors.length}`);
        }
        expression.push(`${prefix}-0`);
        return expression;
      }

      function badgeSvg(background, path) {
        return `
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="20" fill="${background}" stroke="#fff" stroke-width="4"/>
            <path d="${path}" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `;
      }

      function loadSvgImage(svg) {
        return new Promise((resolve, reject) => {
          const image = new Image(48, 48);
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        });
      }

      async function addBadgeImage(name, background, path) {
        if (map.hasImage(name)) return;
        map.addImage(name, await loadSvgImage(badgeSvg(background, path)), { pixelRatio: 2 });
      }

      async function addMapIcons() {
        const icons = {
          trailhead: "M24 13v22 M15 24h18 M18 14h12l-2 6 2 6H18",
          town: "M14 34h20 M16 34V21l8-7 8 7v13 M21 34v-8h6v8",
          place: "M24 34s9-8 9-15a9 9 0 0 0-18 0c0 7 9 15 9 15z M24 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
          improvement: "M24 12l13 23H11L24 12z M24 20v7 M24 32h.01",
        };

        await Promise.all([
          addBadgeImage("icon-trailhead", "#074a67", icons.trailhead),
          addBadgeImage("icon-town", "#5c971c", icons.town),
          addBadgeImage("icon-place", "#8d5b2d", icons.place),
          ...folderColors.map((color, index) => addBadgeImage(`icon-improvement-2025-${index}`, color, icons.improvement)),
          ...folderColors.map((color, index) => addBadgeImage(`icon-improvement-2026-${index}`, color, icons.improvement)),
        ]);
      }

      async function addLayers(srg, osm, improvements, improvements2026) {
        const folders = [...new Set(improvements.features.map(featureFolder))].sort();
        const folderIndex = Object.fromEntries(folders.map((folder, index) => [folder, index]));
        const improvementColor = buildMatchExpression(folderIndex);
        const improvementIcon = iconMatchExpression(folderIndex, "icon-improvement-2025");
        const folders2026 = [...new Set(improvements2026.features.map(featureFolder))].sort();
        const folderIndex2026 = Object.fromEntries(folders2026.map((folder, index) => [folder, index]));
        const improvementColor2026 = buildMatchExpression(folderIndex2026);
        const improvementIcon2026 = iconMatchExpression(folderIndex2026, "icon-improvement-2026");

        await addMapIcons();

        map.addSource("srg", { type: "geojson", data: srg });
        map.addSource("osm-srt", { type: "geojson", data: osm });
        map.addSource("improvements", { type: "geojson", data: improvements });
        map.addSource("improvements-2026", { type: "geojson", data: improvements2026 });

        map.addLayer({
          id: "srg-active-off-road",
          type: "line",
          source: "srg",

      }

      function buildFolderControls(containerId, dataName, folders, folderIndex, improvements) {
        const folderList = document.getElementById(containerId);
        folderList.innerHTML = "";

        for (const folder of folders) {
          const id = `${dataName}-${folder.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}`;
          const count = countFeatures(improvements, (feature) => featureFolder(feature) === folder);
          const label = document.createElement("label");
          label.innerHTML = `
            <input id="${id}" type="checkbox" data-${dataName}="${escapeHtml(folder)}" checked />
            <span class="swatch point" style="background: ${folderColor(folder, folderIndex)}"></span>
            <span>${escapeHtml(folder)}</span>
            <span class="count">${count.toLocaleString()}</span>
          `;
          folderList.appendChild(label);
        }

        folderList.addEventListener("change", () => {
          updateImprovementFolderFilters();
          updateAllLayerGroupToggles();
        });
      }

      function updateImprovementFolderFilter(dataName, layerIds) {
        const checked = [...document.querySelectorAll(`[data-${dataName}]:checked`)].map((input) => input.dataset[dataName]);
        const folderFilter = checked.length
          ? ["in", ["coalesce", ["get", "folder"], "Unsorted"], ["literal", checked]]
          : ["==", ["get", "__never__"], "__none__"];

        for (const layerId of layerIds) {
          if (!map.getLayer(layerId)) continue;
          const geom =
            layerId.includes("lines")
              ? "LineString"
              : layerId.includes("points")
                ? "Point"
                : "Polygon";
          map.setFilter(layerId, ["all", ["==", ["geometry-type"], geom], folderFilter]);
        }
      }

      function updateImprovementFolderFilters() {
        updateImprovementFolderFilter("folder2025", ["improvements-lines", "improvements-polygons-fill", "improvements-polygons-outline", "improvements-points", "improvements-points-icons"]);
        updateImprovementFolderFilter("folder2026", ["improvements-2026-lines", "improvements-2026-polygons-fill", "improvements-2026-polygons-outline", "improvements-2026-points", "improvements-2026-points-icons"]);
      }

      function addPopups() {
        map.on("mousemove", (event) => {
          const activeLayers = clickableLayers.filter((layerId) => map.getLayer(layerId));
          const features = activeLayers.length
            ? map.queryRenderedFeatures(event.point, { layers: activeLayers })
            : [];
          map.getCanvas().style.cursor = features.length ? "pointer" : "";
        });

        map.on("click", (event) => {
          const activeLayers = clickableLayers.filter((layerId) => map.getLayer(layerId));
          const feature = map.queryRenderedFeatures(event.point, { layers: activeLayers })[0];
          if (!feature) {
            if (activePopup) activePopup.remove();
            activePopup = null;
            return;
          }

          if (activePopup) activePopup.remove();
          activePopup = new mapboxgl.Popup({ closeButton: true, maxWidth: "360px" })
            .setLngLat(event.lngLat)
            .setHTML(popupHtml(feature))
            .addTo(map);
        });
      }

      function allCoordinates(geometry, out = []) {
        if (!geometry) return out;
        if (geometry.type === "Point") out.push(geometry.coordinates);
        if (geometry.type === "LineString" || geometry.type === "MultiPoint") out.push(...geometry.coordinates);
        if (geometry.type === "Polygon" || geometry.type === "MultiLineString") {
          geometry.coordinates.flat(1).forEach((coord) => out.push(coord));
        }
        if (geometry.type === "MultiPolygon") {
          geometry.coordinates.flat(2).forEach((coord) => out.push(coord));
        }
        return out;
      }

      function fitGeojsons(geojsons) {
        const coords = geojsons.flatMap((geojson) => geojson.features.flatMap((feature) => allCoordinates(feature.geometry)));
        if (!coords.length) return;
        const bounds = coords.reduce((box, coord) => box.extend(coord), new mapboxgl.LngLatBounds(coords[0], coords[0]));
        map.fitBounds(bounds, { padding: { top: 110, right: 40, bottom: 260, left: 420 }, maxZoom: 13, duration: 700 });
      }

      function setVisibility(toggleName, visible) {
        for (const layerId of layerGroups[toggleName] || []) {
          if (map.getLayer(layerId)) {
            map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none");
          }
        }
      }

      function updateLayerGroupToggle(groupName) {
        const groupToggle = document.querySelector(`[data-layer-group-toggle="${groupName}"]`);
        if (!groupToggle) return;
        const layerToggles = (layerGroupControls[groupName] || [])
          .map((toggleName) => document.querySelector(`[data-layer-toggle="${toggleName}"]`))
          .filter(Boolean);
        const folderDataName = layerGroupFolderControls[groupName];
        const folderToggles = folderDataName
          ? [...document.querySelectorAll(`[data-${folderDataName}]`)]
          : [];
        const toggles = [...layerToggles, ...folderToggles];
        const checkedCount = toggles.filter((input) => input.checked).length;
        groupToggle.checked = toggles.length > 0 && checkedCount === toggles.length;
        groupToggle.indeterminate = checkedCount > 0 && checkedCount < toggles.length;
      }

      function updateAllLayerGroupToggles() {
        Object.keys(layerGroupControls).forEach(updateLayerGroupToggle);
      }

      function setLayerGroupVisibility(groupName, visible) {
        for (const toggleName of layerGroupControls[groupName] || []) {
          const input = document.querySelector(`[data-layer-toggle="${toggleName}"]`);
          if (input) input.checked = visible;
          setVisibility(toggleName, visible);
        }
        const folderDataName = layerGroupFolderControls[groupName];
        if (folderDataName) {
          document.querySelectorAll(`[data-${folderDataName}]`).forEach((input) => {
            input.checked = visible;
          });
          updateImprovementFolderFilters();
        }
        updateLayerGroupToggle(groupName);
      }

      function wireToggles() {
        document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
          input.addEventListener("change", () => {
            setVisibility(input.dataset.layerToggle, input.checked);
            updateAllLayerGroupToggles();
          });
        });
        document.querySelectorAll("[data-layer-group-toggle]").forEach((input) => {
          input.addEventListener("change", () => setLayerGroupVisibility(input.dataset.layerGroupToggle, input.checked));
        });
      }

      function syncLayerVisibilityFromControls() {
        document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
          setVisibility(input.dataset.layerToggle, input.checked);
        });
        updateAllLayerGroupToggles();
        updateImprovementFolderFilters();
      }

      async function renderOverlays() {
        if (!overlays) return;
        if (map.getSource("srg")) {
          syncLayerVisibilityFromControls();
          return;
        }
        await addLayers(overlays.srg, overlays.osm, overlays.improvements, overlays.improvements2026);
        syncLayerVisibilityFromControls();
      }

      function wireBasemapSelector() {
        basemapStyle.addEventListener("change", () => {
          const styleUrl = MAP_STYLES[basemapStyle.value] || MAP_STYLES.outdoors;
          if (activePopup) activePopup.remove();
          activePopup = null;
          map.once("style.load", () => {
            renderOverlays().catch((error) => {
              console.error(error);
              setStatus("Could not redraw overlays after style change", false);
            });
          });
          map.setStyle(styleUrl);
        });
      }

      function folderControlConfig(improvements) {
        const folders = [...new Set(improvements.features.map(featureFolder))].sort();
        const folderIndex = Object.fromEntries(folders.map((folder, index) => [folder, index]));
        return { folders, folderIndex };
      }

      function populateCounts(srg, osm, improvements, improvements2026) {
        setCount("srg-count", srg.features.length);
        setCount("osm-count", osm.features.length);
        setCount("improvements-count", improvements.features.length);
        setCount("improvements-2026-count", improvements2026.features.length);
        setCount("count-srg-active-off-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "active" && f.properties.alignment === "off_road"));
        setCount("count-srg-active-on-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "active" && f.properties.alignment === "on_road"));
        setCount("count-srg-proposed-off-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "proposed" && f.properties.alignment === "off_road"));
        setCount("count-srg-proposed-on-road", countFeatures(srg, (f) => f.properties.layer === "trail" && f.properties.status === "proposed" && f.properties.alignment === "on_road"));
        setCount("count-srg-trailheads", countFeatures(srg, (f) => f.properties.layer === "trailhead"));
        setCount("count-srg-towns", countFeatures(srg, (f) => f.properties.layer === "town"));
        setCount("count-srg-places", countFeatures(srg, (f) => f.properties.layer === "places_to_visit"));
        setCount("count-osm-srt", osm.features.length);
        setCount("count-improvements-lines", countFeatures(improvements, (f) => f.geometry?.type === "LineString"));
        setCount("count-improvements-polygons", countFeatures(improvements, (f) => f.geometry?.type === "Polygon"));
        setCount("count-improvements-points", countFeatures(improvements, (f) => f.geometry?.type === "Point"));
        setCount("count-improvements-2026-lines", countFeatures(improvements2026, (f) => f.geometry?.type === "LineString"));
        setCount("count-improvements-2026-polygons", countFeatures(improvements2026, (f) => f.geometry?.type === "Polygon"));
        setCount("count-improvements-2026-points", countFeatures(improvements2026, (f) => f.geometry?.type === "Point"));
      }

      async function init() {
        try {
          const [rawSrg, osm, improvements, improvements2026] = await Promise.all([
            loadGeojson(DATASETS.srg),
            loadGeojson(DATASETS.osm),
            loadGeojson(DATASETS.improvements),
            loadGeojson(DATASETS.improvements2026),
          ]);
          const srg = withoutExcludedSrgFeatures(rawSrg);
          overlays = { srg, osm, improvements, improvements2026 };

          const render = async () => {
            const folders2025 = folderControlConfig(improvements);
            const folders2026 = folderControlConfig(improvements2026);
            buildFolderControls("folder-list", "folder2025", folders2025.folders, folders2025.folderIndex, improvements);
            buildFolderControls("folder-list-2026", "folder2026", folders2026.folders, folders2026.folderIndex, improvements2026);
            await renderOverlays();
            populateCounts(srg, osm, improvements, improvements2026);
            wireToggles();
            wireBasemapSelector();
            addPopups();
            fitGeojsons([srg, osm, improvements, improvements2026]);
            document.getElementById("fit-visible").addEventListener("click", () => fitGeojsons([srg, osm, improvements, improvements2026]));
            setStatus(`${srg.features.length} SRG, ${osm.features.length} OSM, ${improvements.features.length} 2025 improvements, ${improvements2026.features.length} 2026 improvements`);
          };

          if (map.loaded()) {
            await render();
          } else {
            map.once("load", () => {
              render().catch((error) => {
                console.error(error);
                setStatus("Could not load local GeoJSON files", false);
              });
            });
          }
        } catch (error) {
          console.error(error);
          setStatus("Could not load local GeoJSON files", false);
        }
      }

      init();
    </script>
